name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一PRで複数pushされたら古いjobをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (root)
        env:
          # Puppeteer Chrome の自動ダウンロードはCIでは不要なのでスキップ
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --include=dev

      - name: Run all tests (jest)
        # Phase 1.4: 未使用だった lighthouse require を index.js から除去したため、
        # 既存テスト (integration/api/fullwidth-length) も含めて全件実行できる。
        run: npm test
        env:
          CI: 'true'

      - name: TypeScript typecheck (root)
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --include=dev

      - name: Run ESLint
        # Phase 1.4: コードベースのスタイル/明らかなバグを検出
        # --max-warnings=0 にはせず、warning は許容（gradual adoption）
        run: npm run lint

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Audit production dependencies
        # Phase 1.4: 本番依存に CVE がないかチェック
        # high 以上で失敗。moderate / low はレポートのみ。
        # `|| true` はせず、CI を落として可視化する。
        # devDependencies は除外（CI/開発ツールの脆弱性はサービスへの影響が小さい）
        run: npm audit --omit=dev --audit-level=high

      - name: Audit (informational, all severity)
        # こちらは情報用。dev も含めて全部出すが、失敗しない
        if: always()
        run: npm audit --audit-level=low || true

  client-typecheck:
    name: Client TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Client TypeScript build check
        working-directory: client
        run: npx tsc -b
