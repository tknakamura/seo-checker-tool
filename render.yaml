# render.com デプロイ設定
# SEO・AIOチェックツール（PORT は Render が自動設定するため envVars で指定不要）

services:
  - type: web
    name: mercari-seo-checker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
    # オプション（必要に応じて Dashboard で追加）:
    # - CORS_ORIGIN: フロントのオリジン（複数はカンマ区切り）
    # - MONGODB_URI: 分析履歴用
    # - LOG_LEVEL: info | warn | error
    autoDeploy: true
    branch: main
    healthCheck:
      httpPath: /api/health
      timeoutSeconds: 30
