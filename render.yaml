# render.com デプロイ設定
# SEO AIO Doctor（PORT は Render が自動設定）
# 403 フォールバックは @sparticuz/chromium のバイナリを使用（ビルドで Chrome インストール不要）
# 注: name はRenderダッシュボード上の既存サービスIDと一致させる必要があるため、
#     リネームする際はダッシュボードで先にサービス名を変更してください。

services:
  - type: web
    name: mercari-seo-checker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # 本番では @sparticuz/chromium のバイナリを使うため、
      # puppeteer の Chrome 自動ダウンロードは不要。
      # これを設定しないと npm install で chrome-headless-shell の
      # 取得が失敗してビルドが落ちる（PR #7 デプロイ時に発生）。
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: 'true'
    # オプション（必要に応じて Dashboard で追加）:
    # - CORS_ORIGIN: フロントのオリジン（複数はカンマ区切り）
    # - MONGODB_URI: 分析履歴用
    # - LOG_LEVEL: info | warn | error
    autoDeploy: true
    branch: main
    healthCheck:
      httpPath: /api/health
      timeoutSeconds: 30
