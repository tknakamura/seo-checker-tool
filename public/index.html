<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO AIO Doctor - SEO・AIO総合診断ツール</title>
    <style>
        /* =========================================================
           SEO AIO Doctor — Claw inspired theme (Phase 1.2)
           ベース: 白/淡グレー、彩度控えめ、影なし、角丸8px統一
           ========================================================= */
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --surface-2: #f3f4f6;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --text: #111827;
            --text-muted: #6b7280;
            --text-subtle: #9ca3af;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --accent-border: #bfdbfe;
            --critical: #b91c1c;
            --critical-bg: #fef2f2;
            --high: #b45309;
            --high-bg: #fffbeb;
            --medium: #6b7280;
            --medium-bg: #f9fafb;
            --low: #9ca3af;
            --low-bg: #fafafa;
            --good: #047857;
            --good-bg: #ecfdf5;
            --radius: 8px;
            --radius-sm: 6px;
            --gap: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { font-family: inherit; }

        ::selection { background: var(--accent-soft); }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ---- Header ---- */
        .header {
            text-align: center;
            padding: 24px 0 32px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 0.92rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ---- Card / Section ---- */
        .form-container,
        .results-container,
        .report-section {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        /* ---- Form ---- */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            color: var(--text);
            background: var(--bg);
            transition: border-color .15s ease, box-shadow .15s ease;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .form-group textarea { min-height: 140px; resize: vertical; }

        .check-type-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .check-type-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }
        .check-type-option {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            cursor: pointer;
            background: var(--bg);
            transition: border-color .15s ease, background .15s ease;
        }
        .check-type-option:hover { border-color: var(--accent-border); background: var(--accent-soft); }
        .check-type-option.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .option-icon { font-size: 1.2rem; margin-bottom: 4px; opacity: 0.7; }
        .option-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
        .option-desc { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            padding: 10px 18px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s ease, border-color .15s ease;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border-strong);
        }
        .btn-secondary:hover { background: var(--surface-2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ---- Loading ---- */
        .loading {
            display: none;
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .spinner {
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* ---- Score display ---- */
        .score-display {
            text-align: center;
            padding: 28px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
        }
        .score-number {
            font-size: 3rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .score-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }

        /* ---- Tabs ---- */
        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color .15s ease, border-color .15s ease;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ---- Section / Category ---- */
        .summary-section { margin-bottom: 28px; }
        .summary-section h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.005em;
        }
        .category {
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 14px;
        }
        .category h3 {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }

        /* ---- Score chip ---- */
        .category-score {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .score-excellent { background: var(--good-bg); color: var(--good); border-color: #a7f3d0; }
        .score-good      { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
        .score-fair      { background: var(--high-bg); color: var(--high); border-color: #fde68a; }
        .score-poor      { background: var(--critical-bg); color: var(--critical); border-color: #fecaca; }

        /* ---- Score grid (summary 3 cards) ---- */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .score-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 14px;
            text-align: center;
        }
        .score-item .score-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin: 0 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .score-item .score-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .score-value.score-excellent { color: var(--good); }
        .score-value.score-good { color: var(--accent); }
        .score-value.score-fair { color: var(--high); }
        .score-value.score-poor { color: var(--critical); }

        /* ---- Issues / recommendations list ---- */
        .issues-list, .recommendations-list { margin-top: 12px; }
        .issues-list h4, .recommendations-list h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .issues-list ul, .recommendations-list ul {
            list-style: none;
            padding: 0;
        }
        .issues-list li, .recommendations-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.92rem;
            color: var(--text);
        }
        .issues-list li:last-child, .recommendations-list li:last-child { border-bottom: none; }
        .issues-list li::before { content: "·"; color: var(--critical); margin-right: 8px; font-weight: bold; }
        .recommendations-list li::before { content: "·"; color: var(--good); margin-right: 8px; font-weight: bold; }

        /* ---- Recommendation card (Phase 1) ---- */
        .recommendation-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: border-color .15s ease;
            overflow: hidden;
        }
        .recommendation-item:hover { border-color: var(--border-strong); }
        .recommendation-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            width: 100%;
            text-align: left;
            font: inherit;
            color: inherit;
            background: transparent;
            border: none;
        }
        .recommendation-header[data-toggle] { cursor: pointer; }
        .recommendation-header[data-toggle]:hover { background: var(--surface); }
        /* a11y: フォーカス時の表示（キーボード操作用） */
        .recommendation-header:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
            background: var(--surface);
        }
        .checkmark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--surface-2);
            color: var(--text-muted);
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .recommendation-text {
            flex: 1;
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.5;
        }
        .priority-badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: var(--bg);
            white-space: nowrap;
        }
        .priority-badge.critical { color: var(--critical); border-color: #fecaca; background: var(--critical-bg); }
        .priority-badge.high     { color: var(--high); border-color: #fde68a; background: var(--high-bg); }
        .priority-badge.medium   { color: var(--medium); border-color: var(--border); background: var(--medium-bg); }
        .priority-badge.low      { color: var(--low); border-color: var(--border); background: var(--low-bg); }
        .toggle-icon {
            color: var(--text-subtle);
            font-size: 0.75rem;
            user-select: none;
            flex-shrink: 0;
        }
        .recommendation-details {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 14px 12px 42px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .element-info, .location-info, .count-info {
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface-2);
            color: var(--text-muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
        }
        .count-info { font-family: inherit; }
        .type-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .type-badge.type-seo { background: var(--accent-soft); color: var(--accent); }
        .type-badge.type-aio { background: #f5f3ff; color: #6d28d9; }

        .recommendation-extra {
            padding: 14px;
            margin: 0 14px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .rec-issue {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .rec-issue strong { color: var(--text); font-weight: 600; }
        .rec-code { margin-bottom: 10px; }
        .rec-code h4 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .rec-code pre {
            background: #f8f8f8;
            border: 1px solid var(--border);
            color: #1f2937;
            padding: 12px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .rec-code code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: inherit;
            background: transparent;
            padding: 0;
            white-space: pre;
        }
        .rec-doc a {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .hint {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* ---- Warning banner ---- */
        .warnings-banner { margin: 0 0 18px; }
        .warning-item {
            background: var(--high-bg);
            border: 1px solid #fde68a;
            border-left: 3px solid var(--high);
            color: #78350f;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            margin-bottom: 8px;
        }
        .warning-item strong {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: var(--high);
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        .warning-item details { margin-top: 8px; font-size: 0.82rem; }
        .warning-item details summary { cursor: pointer; color: var(--high); font-weight: 500; }
        .warning-item details code {
            display: block;
            margin-top: 6px;
            background: rgba(0,0,0,0.04);
            padding: 6px 8px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.8rem;
            color: #78350f;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ---- Error / Success messages ---- */
        .error-message {
            background: var(--critical-bg);
            color: var(--critical);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .success-message {
            background: var(--good-bg);
            color: var(--good);
            border: 1px solid #a7f3d0;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        /* ---- Detailed report blocks ---- */
        .detailed-report { max-width: 100%; }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }
        .score-large {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
            margin: 4px 0;
            letter-spacing: -0.02em;
        }
        .grade {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--good);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-weight: 500;
            font-size: 0.82rem;
            margin: 8px 0;
            border: 1px solid var(--border);
        }
        .status-critical { background: var(--critical-bg); color: var(--critical); border-color: #fecaca; }
        .status-warning  { background: var(--high-bg); color: var(--high); border-color: #fde68a; }
        .status-good     { background: var(--good-bg); color: var(--good); border-color: #a7f3d0; }
        .status-poor     { background: var(--critical-bg); color: var(--critical); border-color: #fecaca; }

        .quick-wins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .quick-win-card {
            background: var(--good-bg);
            border: 1px solid #a7f3d0;
            border-left: 3px solid var(--good);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.9rem;
        }
        .win-meta { display: flex; gap: 12px; margin-top: 4px; font-size: 0.8rem; color: var(--text-muted); }

        .priority-sections { margin-bottom: 20px; }
        .priority-section {
            margin-bottom: 14px;
            padding: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .priority-section.critical { background: var(--critical-bg); border-color: #fecaca; }
        .priority-section.high     { background: var(--high-bg); border-color: #fde68a; }
        .priority-section.medium   { background: var(--accent-soft); border-color: var(--accent-border); }
        .priority-section.low      { background: var(--good-bg); border-color: #a7f3d0; }
        .priority-item {
            background: var(--bg);
            padding: 12px;
            margin: 6px 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .item-meta { display: flex; gap: 12px; margin: 6px 0; font-size: 0.8rem; color: var(--text-muted); }

        .implementation-phase {
            margin-bottom: 18px;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .implementation-item {
            background: var(--bg);
            padding: 14px;
            margin: 10px 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .implementation-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
            margin-top: 10px;
        }
        .implementation-guide ol, .implementation-examples ul {
            margin: 6px 0;
            padding-left: 1.2rem;
            font-size: 0.9rem;
        }
        .tools-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .tool-tag {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent-border);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
        }

        .impact-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .impact-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            text-align: center;
        }
        .impact-card .score {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .impact-card .score.improvement { color: var(--good); }
        .benefits ul { margin: 6px 0; padding-left: 1.2rem; font-size: 0.9rem; }

        /* ---- Specific issues ---- */
        .specific-issues { max-width: 100%; }
        .specific-issues .description {
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            border-left: 3px solid var(--accent);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            font-size: 0.9rem;
            color: var(--text);
        }
        .category-section {
            margin-bottom: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .category-section h3 {
            background: var(--surface);
            padding: 12px 14px;
            margin: 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-weight: 600;
        }
        .specific-issue {
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color .15s ease;
        }
        .specific-issue:hover { background-color: var(--surface); }
        .specific-issue:last-child { border-bottom: none; }
        .issue-header {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 14px;
        }
        .issue-type {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 500;
            background: var(--surface-2);
            color: var(--text-muted);
        }
        .issue-type.critical, .issue-type.missing { background: var(--critical-bg); color: var(--critical); }
        .issue-type.high { background: var(--high-bg); color: var(--high); }
        .issue-location {
            flex: 1;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .issue-description {
            padding: 0 14px 10px;
            font-size: 0.88rem;
            color: var(--text);
        }
        .issue-details {
            padding: 12px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 0.88rem;
        }
        .issue-fix h4, .issue-current h4 {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .issue-current code {
            display: block;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.82rem;
            color: var(--text);
            word-break: break-all;
        }
        .issue-meta { display: flex; gap: 10px; margin-top: 8px; font-size: 0.8rem; color: var(--text-muted); }
        .meta-item {
            background: var(--bg);
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* ---- Report content (Markdown) ---- */
        .report-content {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-sm);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
            color: var(--text);
        }

        /* ---- Structured data view (legacy classes preserved) ---- */
        .structured-data-analysis { max-width: 100%; }
        .page-type-analysis {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            text-align: center;
        }
        .page-type-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .page-type-confidence { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
        .page-type-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        .recommendation-section, .schema-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }
        .schema-name { font-weight: 600; }
        .schema-priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border);
        }
        .schema-priority.critical { color: var(--critical); background: var(--critical-bg); border-color: #fecaca; }
        .schema-priority.high     { color: var(--high); background: var(--high-bg); border-color: #fde68a; }
        .schema-priority.medium   { color: var(--medium); background: var(--medium-bg); }
        .schema-priority.low      { color: var(--low); background: var(--low-bg); }

        /* ---- Responsive ---- */
        @media (max-width: 720px) {
            .container { padding: 20px 16px 48px; }
            .header h1 { font-size: 1.35rem; }
            .check-type-options { grid-template-columns: 1fr; }
            .score-grid { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            .button-group .btn { width: 100%; }
            .summary-cards { grid-template-columns: 1fr; }
            .quick-wins-grid { grid-template-columns: 1fr; }
            .implementation-details { grid-template-columns: 1fr; }
            .impact-cards { grid-template-columns: 1fr; }
        }
    </style>

</head>
<body>
    <div class="container">
        <header class="header">
            <h1>SEO AIO Doctor</h1>
            <p>WebページのSEOとAI検索最適化（AIO）を診断し、具体的な改善コードを提示します</p>
        </header>

        <div class="form-container">
            <form id="seoCheckForm">
                <div class="form-group">
                    <label for="url">WebページURL</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="html">またはHTMLコンテンツ（オプション）</label>
                    <textarea id="html" name="html" placeholder="HTMLコンテンツを直接貼り付ける場合はこちらに記入してください"></textarea>
                </div>

                <div class="form-group">
                    <label class="check-type-label">チェックタイプを選択してください</label>
                    <div class="check-type-options">
                        <div class="check-type-option" data-type="simple">
                            <div class="option-title">Simple</div>
                            <div class="option-desc">高速。静的HTMLのみ取得</div>
                        </div>
                        <div class="check-type-option active" data-type="advanced">
                            <div class="option-title">Advanced</div>
                            <div class="option-desc">JavaScript実行後に診断（SPA対応）</div>
                        </div>
                    </div>
                    <input type="hidden" id="waitForJS" name="waitForJS" value="true">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="checkBtn">
                        診断する
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        クリア
                    </button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>診断中...</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="tabs">
                <button class="tab active" data-tab="summary">サマリー</button>
                <button class="tab" data-tab="details">SEO詳細</button>
                <button class="tab" data-tab="aio">AIO詳細</button>
                <button class="tab" data-tab="structured-data">構造化データ</button>
                <button class="tab" data-tab="specific">具体的な箇所</button>
                <button class="tab" data-tab="detailed">詳細レポート</button>
                <button class="tab" data-tab="report">Markdownレポート</button>
            </div>

            <div class="tab-content active" id="summary">
                <div id="summaryContent"></div>
            </div>

            <div class="tab-content" id="details">
                <div id="detailsContent"></div>
            </div>

            <div class="tab-content" id="aio">
                <div id="aioContent"></div>
            </div>

            <div class="tab-content" id="structured-data">
                <div id="structuredDataContent"></div>
            </div>

            <div class="tab-content" id="specific">
                <div id="specificContent"></div>
            </div>

            <div class="tab-content" id="detailed">
                <div id="detailedContent"></div>
            </div>

            <div class="tab-content" id="report">
                <div class="report-section">
                    <h2>SEOチェックレポート</h2>
                    <div class="report-content" id="reportContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class SEOCheckerApp {
            constructor() {
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                // チェックタイプ選択処理
                document.querySelectorAll('.check-type-option').forEach(option => {
                    option.addEventListener('click', function() {
                        // すべてのオプションからactiveクラスを削除
                        document.querySelectorAll('.check-type-option').forEach(opt => {
                            opt.classList.remove('active');
                        });
                        
                        // クリックされたオプションにactiveクラスを追加
                        this.classList.add('active');
                        
                        // waitForJSの値を更新
                        const waitForJSInput = document.getElementById('waitForJS');
                        waitForJSInput.value = this.dataset.type === 'advanced' ? 'true' : 'false';
                    });
                });

                document.getElementById('seoCheckForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.runSEOCheck();
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.clearForm();
                });

                // タブ切り替え
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.switchTab(e.target.dataset.tab);
                    });
                });
            }

            async runSEOCheck() {
                const url = document.getElementById('url').value;
                const html = document.getElementById('html').value;
                const waitForJS = document.getElementById('waitForJS').checked;

                if (!url && !html) {
                    this.showError('URLまたはHTMLコンテンツを入力してください');
                    return;
                }

                this.showLoading(true);
                this.hideResults();

                try {
                    const response = await fetch('/api/check/seo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ url, html, waitForJS })
                    });

                    const data = await response.json();

                    if (data.success) {
                        this.displayResults(data.data);
                        this.showSuccess('SEOチェックが完了しました');
                    } else {
                        this.showError(data.error || 'SEOチェック中にエラーが発生しました');
                    }
                } catch (error) {
                    this.showError('ネットワークエラーが発生しました: ' + error.message);
                } finally {
                    this.showLoading(false);
                }
            }

            async generateReport() {
                const url = document.getElementById('url').value;
                const html = document.getElementById('html').value;
                const waitForJS = document.getElementById('waitForJS').checked;

                try {
                    const response = await fetch('/api/report/seo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ url, html, waitForJS })
                    });

                    const data = await response.json();

                    if (data.success) {
                        document.getElementById('reportContent').textContent = data.data.report;
                    } else {
                        this.showError('レポート生成中にエラーが発生しました');
                    }
                } catch (error) {
                    this.showError('レポート生成中にネットワークエラーが発生しました');
                }
            }

            displayResults(results) {
                // ヘッダのoverallScore要素はPhase 1.2で削除（スコアはサマリーカードのみで表現）
                const overallEl = document.getElementById('overallScore');
                if (overallEl) overallEl.textContent = results.combinedScore || results.overallScore;

                // サマリー表示
                this.displaySummary(results);
                
                // 詳細表示
                this.displayDetails(results);
                
                // AIO詳細表示
                this.displayAIO(results);
                
                // 構造化データ詳細表示
                this.displayStructuredData(results);
                
                // 具体的な箇所表示
                this.displaySpecificIssues(results);
                
                // 詳細レポート表示
                this.displayDetailedReport(results);
                
                // レポート生成
                this.generateReport();
                
                this.showResults();
            }

            displaySummary(results) {
                const summaryContent = document.getElementById('summaryContent');
                const overallScore = results.overallScore || 0;
                const aioScore = results.aioOverallScore || 0;
                const combinedScore = results.combinedScore || 0;

                // スコア表示の更新（Phase 1.2: overallScore要素は削除済み、念のためガード）
                const overallEl2 = document.getElementById('overallScore');
                if (overallEl2) overallEl2.textContent = Math.round(overallScore);

                // 警告バナー（Advanced→Simple フォールバック等）
                let warningsHtml = '';
                if (Array.isArray(results.warnings) && results.warnings.length > 0) {
                    warningsHtml = '<div class="warnings-banner" role="region" aria-label="診断時の警告">' +
                        results.warnings.map(w =>
                            `<div class="warning-item" role="alert" aria-live="polite"><strong aria-label="警告コード">⚠️ ${this.escapeHtml(w.code || 'WARNING')}</strong><div>${this.escapeHtml(w.message || '')}</div>${w.detail ? `<details><summary>詳細</summary><code>${this.escapeHtml(w.detail)}</code></details>` : ''}</div>`
                        ).join('') +
                        '</div>';
                }

                let html = warningsHtml + `
                    <div class="summary-section">
                        <h2>総合スコア</h2>
                        <div class="score-grid">
                            <div class="score-item">
                                <div class="score-label">SEOスコア</div>
                                <div class="score-value ${this.getScoreClass(overallScore)}">${Math.round(overallScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">AIOスコア</div>
                                <div class="score-value ${this.getScoreClass(aioScore)}">${Math.round(aioScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">総合スコア</div>
                                <div class="score-value ${this.getScoreClass(combinedScore)}">${Math.round(combinedScore)}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 簡潔な推奨アクションの表示
                if (results.conciseRecommendations && results.conciseRecommendations.length > 0) {
                    html += `
                        <div class="summary-section">
                            <h2>推奨アクション (${results.conciseRecommendations.length}件)</h2>
                            <div class="recommendations-list">
                    `;
                    
                    results.conciseRecommendations.forEach((rec, idx) => {
                        const priorityClass = this.getPriorityClass(rec.priority);
                        const hasDetails = !!(rec.codeExample || rec.docLink);
                        const detailsId = `rec-details-${idx}`;
                        const typeBadge = rec.type
                            ? `<span class="type-badge type-${rec.type}">${rec.type.toUpperCase()}</span>`
                            : '';
                        const codeBlock = rec.codeExample
                            ? `<div class="rec-code"><h4>修正例</h4><pre><code>${this.escapeHtml(rec.codeExample)}</code></pre></div>`
                            : '';
                        const docLink = rec.docLink
                            ? `<div class="rec-doc"><a href="${rec.docLink}" target="_blank" rel="noopener noreferrer">📖 参考ドキュメント →</a></div>`
                            : '';
                        const issueLine = rec.issue
                            ? `<div class="rec-issue"><strong>検出された問題:</strong> ${this.escapeHtml(rec.issue)}</div>`
                            : '';
                        const toggle = hasDetails
                            ? `<span class="toggle-icon" data-target="${detailsId}">▼</span>`
                            : '';
                        const extra = hasDetails
                            ? `<div class="recommendation-extra" id="${detailsId}" style="display:none;">${issueLine}${codeBlock}${docLink}</div>`
                            : '';
                        // Phase 1.3: a11y — 開閉トグルがある行は <button>, ない行は <div>
                        const headerOpenTag = hasDetails
                            ? `<button type="button" class="recommendation-header" data-toggle="${detailsId}" aria-expanded="false" aria-controls="${detailsId}">`
                            : `<div class="recommendation-header">`;
                        const headerCloseTag = hasDetails ? `</button>` : `</div>`;
                        html += `
                            <div class="recommendation-item ${priorityClass}">
                                ${headerOpenTag}
                                    <span class="checkmark" aria-hidden="true">✓</span>
                                    <span class="recommendation-text">${this.escapeHtml(rec.fix)}</span>
                                    <span class="priority-badge ${priorityClass}" aria-label="優先度: ${this.getPriorityTitle(rec.priority)}">${this.getPriorityTitle(rec.priority)}</span>
                                    ${toggle}
                                ${headerCloseTag}
                                <div class="recommendation-details">
                                    <span class="element-info">${this.escapeHtml(rec.element)}</span>
                                    <span class="location-info">${this.escapeHtml(rec.location)}</span>
                                    ${rec.count > 1 ? `<span class="count-info">${rec.count}件</span>` : ''}
                                    ${typeBadge}
                                </div>
                                ${extra}
                            </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                }
                
                summaryContent.innerHTML = html;
                this.attachRecommendationToggles();
            }

            displayDetails(results) {
                const detailsContent = document.getElementById('detailsContent');
                const categories = [
                    { key: 'titleTag', name: 'タイトルタグ' },
                    { key: 'metaDescription', name: 'メタディスクリプション' },
                    { key: 'headingStructure', name: '見出し構造（H1〜H3）' },
                    { key: 'imageAltAttributes', name: '画像のalt属性' },
                    { key: 'internalLinkStructure', name: '内部リンク構造' },
                    { key: 'structuredData', name: '構造化データ' },
                    { key: 'otherSEOElements', name: 'その他SEO要素' }
                ];

                let html = '';
                
                categories.forEach(category => {
                    const check = results.checks[category.key];
                    const scoreClass = this.getScoreClass(check.score);
                    
                    html += `
                        <div class="category">
                            <h3>${category.name}</h3>
                            <div class="category-score ${scoreClass}">スコア: ${check.score}/100</div>
                            
                            ${check.current !== undefined ? `<p><strong>現在の値:</strong> ${check.current}</p>` : ''}
                            
                            ${check.issues && check.issues.length > 0 ? `
                                <div class="issues-list">
                                    <h4>改善点 (${check.issues.length}件)</h4>
                                    <ul>
                                        ${check.issues.map(issue => `<li>${issue}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                            
                            ${check.recommendations && check.recommendations.length > 0 ? `
                                <div class="recommendations-list">
                                    <h4>推奨アクション (${check.recommendations.length}件)</h4>
                                    <ul>
                                        ${check.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                detailsContent.innerHTML = html;
            }

            displayAIO(results) {
                if (!results.aio) {
                    document.getElementById('aioContent').innerHTML = '<p>AIOチェック結果がありません</p>';
                    return;
                }

                const aioContent = document.getElementById('aioContent');
                const aioCategories = [
                    { key: 'contentComprehensiveness', name: 'コンテンツ包括性' },
                    { key: 'structuredInformation', name: '構造化情報' },
                    { key: 'credibilitySignals', name: '信頼性シグナル' },
                    { key: 'aiSearchOptimization', name: 'AI検索最適化' },
                    { key: 'naturalLanguageQuality', name: '自然言語品質' },
                    { key: 'contextRelevance', name: 'コンテキスト関連性' },
                    { key: 'llmsTxtCompliance', name: 'llms.txt 対応' }
                ];

                let html = `
                    <div class="score-display" style="margin-bottom: 2rem;">
                        <div class="score-number">${results.aio.overallScore}</div>
                        <div class="score-label">AIO総合スコア</div>
                    </div>
                `;
                
                aioCategories.forEach(category => {
                    const check = results.aio.checks[category.key];
                    const scoreClass = this.getScoreClass(check.score);
                    
                    html += `
                        <div class="category">
                            <h3>${category.name}</h3>
                            <div class="category-score ${scoreClass}">スコア: ${check.score}/100</div>
                            
                            ${check.issues && check.issues.length > 0 ? `
                                <div class="issues-list">
                                    <h4>改善点 (${check.issues.length}件)</h4>
                                    <ul>
                                        ${check.issues.map(issue => `<li>${issue}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                            
                            ${check.recommendations && check.recommendations.length > 0 ? `
                                <div class="recommendations-list">
                                    <h4>推奨アクション (${check.recommendations.length}件)</h4>
                                    <ul>
                                        ${check.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                aioContent.innerHTML = html;
            }

            displayStructuredData(results) {
                const structuredDataContent = document.getElementById('structuredDataContent');
                const structuredDataCheck = results.checks.structuredData;
                
                if (!structuredDataCheck) {
                    structuredDataContent.innerHTML = '<p>構造化データのチェック結果がありません</p>';
                    return;
                }

                let html = `<div class="structured-data-analysis">`;

                // ページタイプ分析結果
                if (structuredDataCheck.pageTypeAnalysis) {
                    const analysis = structuredDataCheck.pageTypeAnalysis;
                    const confidence = Math.round(analysis.confidence * 100);
                    
                    html += `
                        <div class="page-type-analysis">
                            <div class="page-type-title">📄 ページタイプ分析結果</div>
                            <div class="page-type-confidence">判定: ${this.getPageTypeDisplayName(analysis.primaryType)} (信頼度: ${confidence}%)</div>
                            <div class="page-type-details">
                                <div class="page-type-detail">
                                    <h4>主要タイプ</h4>
                                    <p>${analysis.primaryType}</p>
                                </div>
                                ${analysis.secondaryTypes && analysis.secondaryTypes.length > 0 ? `
                                    <div class="page-type-detail">
                                        <h4>候補タイプ</h4>
                                        <p>${analysis.secondaryTypes.join(', ')}</p>
                                    </div>
                                ` : ''}
                                <div class="page-type-detail">
                                    <h4>分析根拠</h4>
                                    <p>${this.getAnalysisReason(analysis)}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 構造化データ推奨事項
                if (structuredDataCheck.structuredDataRecommendations) {
                    const recommendations = structuredDataCheck.structuredDataRecommendations;
                    
                    html += `<div class="schema-recommendations">`;

                    // 不足スキーマ（必須）
                    if (recommendations.recommendations.missing.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3>🚨 必須スキーマ (${recommendations.recommendations.missing.length}件)</h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.missing.forEach((item, index) => {
                            const schemaId = `missing_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    // 推奨スキーマ
                    if (recommendations.recommendations.improvements.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3>⭐ 推奨スキーマ (${recommendations.recommendations.improvements.length}件)</h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.improvements.forEach((item, index) => {
                            const schemaId = `improvement_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    // オプションスキーマ
                    if (recommendations.recommendations.optional.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3>💡 オプションスキーマ (${recommendations.recommendations.optional.length}件)</h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.optional.forEach((item, index) => {
                            const schemaId = `optional_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    html += `</div>`; // schema-recommendations

                    // 期待される効果
                    if (recommendations.expectedBenefits) {
                        const benefits = recommendations.expectedBenefits;
                        html += `
                            <div class="expected-benefits">
                                <h3>📈 期待される効果</h3>
                                <div class="benefits-grid">
                                    <div class="benefit-item">
                                        <div class="benefit-percentage">${benefits.richSnippets.probability}%</div>

            getPageTypeDisplayName(pageType) {

            getAnalysisReason(analysis) {
                if (analysis.analysisDetails && analysis.analysisDetails.matchedPatterns) {
                    const patterns = analysis.analysisDetails.matchedPatterns;
                    const reasons = [];
                    
                    if (patterns.keywords && patterns.keywords.length > 0) {
                        reasons.push(`キーワード: ${patterns.keywords.slice(0, 3).join(', ')}`);
                    }
                    if (patterns.titlePatterns && patterns.titlePatterns.length > 0) {
                        reasons.push(`タイトルパターン: ${patterns.titlePatterns.slice(0, 2).join(', ')}`);
                    }
                    if (patterns.urlPatterns && patterns.urlPatterns.length > 0) {
                        reasons.push(`URLパターン: ${patterns.urlPatterns.slice(0, 2).join(', ')}`);
                    }
                    
                    return reasons.join(', ') || '内容分析による判定';
                }
                
                return '内容分析による判定';
            }

                        </div>

                        <div class="implementation-plan">

                                    <div class="phase-items">

                        <div class="expected-impact">

                                    <li>ランキング: +${report.expectedImpact.expectedBenefits.seo.rankingImprovement}位向上</li>
                                    <li>CTR: +${report.expectedImpact.expectedBenefits.seo.clickThroughRate}</li>
                                    <li>AIO: AI検索での露出 +${report.expectedImpact.expectedBenefits.aio.aiVisibility}%</li>

            getScoreClass(score) {
                if (score >= 90) return 'score-excellent';
                if (score >= 70) return 'score-good';
                if (score >= 50) return 'score-fair';
                return 'score-poor';
            }

            getStatusClass(status) {
                if (status === '要緊急対応') return 'status-critical';
                if (status === '良好') return 'status-good';
                if (status === '改善必要') return 'status-warning';
                return 'status-poor';
            }

            getCategoryTitle(category) {
                const titles = {
                    titleTag: 'タイトルタグ',
                    metaDescription: 'メタディスクリプション',
                    headingStructure: '見出し構造',
                    imageAltAttributes: '画像alt属性',
                    internalLinkStructure: '内部リンク構造',

                    otherSEOElements: 'その他SEO要素',
                    contentComprehensiveness: 'コンテンツ包括性',
                    structuredInformation: '構造化情報',
                    credibilitySignals: '信頼性シグナル',
                    aiSearchOptimization: 'AI検索最適化',
                    naturalLanguageQuality: '自然言語品質',

                    llmsTxtCompliance: 'llms.txt 対応'
                };
                return titles[category] || category;

            getIssueTypeLabel(type) {
                const labels = {
                    missing: '存在しない',
                    length: '長さの問題',
                    duplicate: '重複',
                    format: '形式の問題',
                    quality: '品質の問題',
                    hierarchy: '階層の問題',
                    empty: '空の要素',
                    count: '数の問題',
                    missing_alt: 'alt属性なし',
                    empty_alt: '空のalt属性',
                    alt_length: 'alt属性の長さ',
                    alt_quality: 'alt属性の品質',
                    internal_count: '内部リンク数',
                    external_missing: '外部リンクなし',
                    empty_text: '空のリンクテキスト',
                    generic_text: '汎用的なリンクテキスト',
                    jsonld_syntax: 'JSON-LD構文エラー',
                    missing_schema: 'スキーマ不足',
                    protocol: 'プロトコル',
                    depth: 'ディレクトリの深さ',
                    viewport_content: 'viewport内容',
                    noindex: 'noindex設定'
                };
                return labels[type] || type;
            }

            getPriorityClass(priority) {
                const classes = {
                    critical: 'critical',
                    high: 'high',
                    medium: 'medium',
                    low: 'low'
                };
                return classes[priority] || 'medium';
            }

            escapeHtml(str) {
                if (str == null) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            attachRecommendationToggles() {
                document.querySelectorAll('.recommendation-header[data-toggle]').forEach(el => {
                    if (el.dataset.bound === '1') return;
                    el.dataset.bound = '1';
                    el.addEventListener('click', (e) => {
                        // 内部リンクのクリックは無視
                        if (e.target.tagName === 'A') return;
                        const targetId = el.dataset.toggle;
                        const panel = document.getElementById(targetId);
                        const icon = el.querySelector('.toggle-icon');
                        if (!panel) return;
                        const isOpen = panel.style.display !== 'none';
                        panel.style.display = isOpen ? 'none' : 'block';
                        if (icon) icon.textContent = isOpen ? '▼' : '▲';
                        // Phase 1.3: a11y — aria-expanded を実際の状態に追従
                        // ボタン化していない場合（fallback）でも setAttribute は安全
                        el.setAttribute('aria-expanded', String(!isOpen));
                    });
                });
                // 展開エリア内のクリックは折りたたみ伝播を止める（コピー可能に）
                document.querySelectorAll('.recommendation-extra').forEach(el => {
                    if (el.dataset.bound === '1') return;
                    el.dataset.bound = '1';
                    el.addEventListener('click', (e) => e.stopPropagation());
                });
            }

            switchTab(tabName) {
                // タブボタンの切り替え
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

                // タブコンテンツの切り替え
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');
            }

            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('checkBtn').disabled = show;
            }

            showResults() {
                document.getElementById('resultsContainer').style.display = 'block';
            }

            hideResults() {
                document.getElementById('resultsContainer').style.display = 'none';
            }

            showError(message) {
                this.showMessage(message, 'error');
            }

            showSuccess(message) {
                this.showMessage(message, 'success');
            }

            showMessage(message, type) {
                // 既存のメッセージを削除
                const existingMessage = document.querySelector('.error-message, .success-message');
                if (existingMessage) {
                    existingMessage.remove();
                }

                const messageDiv = document.createElement('div');
                messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
                messageDiv.textContent = message;

                document.querySelector('.form-container').insertBefore(messageDiv, document.querySelector('.form-container').firstChild);

                // 3秒後にメッセージを削除
                setTimeout(() => {
                    messageDiv.remove();
                }, 3000);
            }

            clearForm() {
                document.getElementById('seoCheckForm').reset();
                this.hideResults();
            }
        }

        // 問題詳細の表示切り替え関数
        function toggleIssueDetails(issueId) {
            const details = document.getElementById(issueId);
            const icon = details.previousElementSibling.querySelector('.toggle-icon');
            
            if (details.style.display === 'none') {
                details.style.display = 'block';
                icon.textContent = '▲';
            } else {
                details.style.display = 'none';
                icon.textContent = '▼';
            }
        }

        // グローバルヘルパー関数
        function toggleSchemaContent(schemaId) {
            const content = document.getElementById(schemaId);
            if (content) {
                content.classList.toggle('active');
            }
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                const text = element.textContent || element.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    // 一時的にボタンのテキストを変更
                    const button = event.target;
                    const originalText = button.textContent;
                    button.textContent = '✅ コピー完了！';
                    button.style.background = '#28a745';
                    
                    setTimeout(() => {
                        button.textContent = originalText;
                        button.style.background = '';
                    }, 2000);
                }).catch(err => {
                    console.error('コピーに失敗しました:', err);
                    alert('コピーに失敗しました。手動でコピーしてください。');
                });
            }
        }

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            new SEOCheckerApp();
        });
    </script>
