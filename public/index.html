                    warningsHtml = '<div class="warnings-banner" role="region" aria-label="診断時の警告">' +
                        results.warnings.map(w =>
                            `<div class="warning-item" role="alert" aria-live="polite"><strong aria-label="警告コード">⚠️ ${this.escapeHtml(w.code || 'WARNING')}</strong><div>${this.escapeHtml(w.message || '')}</div>${w.detail ? `<details><summary>詳細</summary><code>${this.escapeHtml(w.detail)}</code></details>` : ''}</div>`
                        ).join('') +
                        '</div>';
                }

                let html = warningsHtml + `
                    <div class="summary-section">
                        <h2>総合スコア</h2>
                        <div class="score-grid">
                            <div class="score-item">
                                <div class="score-label">SEOスコア</div>
                                <div class="score-value ${this.getScoreClass(overallScore)}">${Math.round(overallScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">AIOスコア</div>
                                <div class="score-value ${this.getScoreClass(aioScore)}">${Math.round(aioScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">総合スコア</div>
                                <div class="score-value ${this.getScoreClass(combinedScore)}">${Math.round(combinedScore)}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Phase 2-I: サマリーは Critical + High のみ抜粋
                // Medium/Low は「詳細データ」タブで全件確認可能
                if (results.conciseRecommendations && results.conciseRecommendations.length > 0) {
                    const topRecs = results.conciseRecommendations.filter(r =>
                        r.priority === 'critical' || r.priority === 'high'
                    );
                    const restCount = results.conciseRecommendations.length - topRecs.length;
                    const headingText = topRecs.length > 0
                        ? `今すぐ対応すべき推奨アクション (${topRecs.length}件)`
                        : '推奨アクション';
                    const restHint = restCount > 0
                        ? `<p class="summary-rest-hint">他に Medium/Low 優先度の項目が ${restCount} 件あります → <a href="#" class="goto-details-tab">詳細データタブ</a>で確認できます</p>`
                        : '';
                    html += `
                        <div class="summary-section">
                            <h2>${headingText}</h2>
                            ${restHint}
                            <div class="recommendations-list">
                    `;
                    
                    // Phase 2-E: 推奨アクションごとに「AI書き換え対象」を判定する
                    // category と issue 文言からマッピング
                    const llmTargetFor = (rec) => {
                        if (!rec) return null;
                        const cat = rec.category;
                        const issue = rec.issue || rec.fix || '';
                        // タイトル
                        if (cat === 'titleTag') return { target: 'title', label: 'タイトル' };
                        // メタディスクリプション
                        if (cat === 'metaDescription') return { target: 'metaDescription', label: 'メタディスクリプション' };
                        // H1 (見出し構造の中で H1 関連の issue のみ)
                        if (cat === 'headingStructure' && /H1/.test(issue)) return { target: 'h1', label: 'H1 見出し' };
                        // リンクテキスト
                        if (cat === 'internalLinkStructure' && /(リンクテキスト|汎用|空)/.test(issue)) return { target: 'linkText', label: 'リンクテキスト' };
                        // alt属性
                        if (cat === 'imageAltAttributes' && /(alt属性|alt)/i.test(issue)) return { target: 'altText', label: '画像 alt属性' };
                        return null;
                    };

                    // 診断結果からページ文脈を抽出 (LLM への入力用)
                    this._lastPageContext = {
                        url: results.url || '',
                        title: (results.checks && results.checks.titleTag && results.checks.titleTag.current) || '',
                        metaDescription: (results.checks && results.checks.metaDescription && results.checks.metaDescription.current) || '',
                        headings: [
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h1Texts || []),
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h2Texts || []),
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h3Texts || []),
                        ].slice(0, 15),
                    };

                    // Phase 2-I: Critical+High のみ表示 (Medium/Low は詳細データタブで)
                    topRecs.forEach((rec, idx) => {
                        const priorityClass = this.getPriorityClass(rec.priority);
                        const llmTarget = llmTargetFor(rec);
                        // Phase 2-E: AI 書き換えボタンも展開可能なら hasDetails=true
                        const hasDetails = !!(rec.codeExample || rec.docLink || llmTarget);
                        const detailsId = `rec-details-${idx}`;
                        const typeBadge = rec.type
                            ? `<span class="type-badge type-${rec.type}">${rec.type.toUpperCase()}</span>`
                            : '';
                        const codeBlock = rec.codeExample
                            ? `<div class="rec-code"><h4>修正例</h4><pre><code>${this.escapeHtml(rec.codeExample)}</code></pre></div>`
                            : '';
                        const docLink = rec.docLink
                            ? `<div class="rec-doc"><a href="${rec.docLink}" target="_blank" rel="noopener noreferrer">📖 参考ドキュメント →</a></div>`
                            : '';
                        const issueLine = rec.issue
                            ? `<div class="rec-issue"><strong>検出された問題:</strong> ${this.escapeHtml(rec.issue)}</div>`
                            : '';
                        // Phase 2-E: AI 書き換えボタン (該当 category のみ)
                        // Phase 2-E.1: 視認性を上げるため CTA ブロックとして大きく目立つ位置に配置
                        const llmButton = llmTarget
                            ? `<div class="rec-llm-suggest" data-llm-target="${llmTarget.target}" data-llm-label="${this.escapeHtml(llmTarget.label)}" data-llm-current="${this.escapeHtml(this._extractCurrentValue(rec, results))}">
                                <button type="button" class="llm-suggest-btn">✨ AI に「${this.escapeHtml(llmTarget.label)}」の書き換え案を提案させる</button>
                                <p class="llm-suggest-hint">現状を踏まえて 3 つの改善案を OpenAI gpt-4o-mini が生成します（数秒）</p>
                                <div class="llm-suggest-result" hidden></div>
                            </div>`
                            : '';
                        // Phase 2-E.1: 閉じた状態でも 'AI 提案可能' バッジを表示してボタンの存在を予告
                        const llmAvailableBadge = llmTarget
                            ? `<span class="llm-available-badge" title="AI で書き換え案を提案できます">✨ AI 提案可</span>`
                            : '';
                        const toggle = hasDetails
                            ? `<span class="toggle-icon" data-target="${detailsId}">▼</span>`
                            : '';
                        // Phase 2-E.2: 該当箇所セクション (該当する src/href/heading等を一覧表示)
                        const locations = this._extractLocations(rec, results);
                        let locationsBlock = '';
                        if (locations.length > 0) {
                            const SHOW_LIMIT = 5;
                            const visibleItems = locations.slice(0, SHOW_LIMIT);
                            const hiddenItems = locations.slice(SHOW_LIMIT);
                            // Phase 2-G: link/image タイプは個別 AI 書き換えボタンを設置
                            const individualLlmTarget = llmTarget && (llmTarget.target === 'linkText' || llmTarget.target === 'altText')
                                ? llmTarget.target
                                : null;
                            const renderItem = (loc) => {
                                const hintHtml = loc.hint ? `<span class="loc-hint">${this.escapeHtml(loc.hint)}</span>` : '';
                                // URL は新タブで開けるリンクに、それ以外はテキスト
                                let labelHtml;
                                if (loc.type === 'image' || loc.type === 'link') {
                                    // 絶対URLの場合のみ a タグ化（相対URLは origin を補完できないのでテキスト）
                                    const isAbsolute = /^https?:\/\//i.test(loc.label);
                                    labelHtml = isAbsolute
                                        ? `<a href="${this.escapeHtml(loc.label)}" target="_blank" rel="noopener noreferrer" class="loc-url" title="${this.escapeHtml(loc.label)}">${this.escapeHtml(loc.label)}</a>`
                                        : `<code class="loc-url">${this.escapeHtml(loc.label)}</code>`;
                                    // Phase 2-G: 該当 link/image に個別 AI 書き換えボタン
                                    if (individualLlmTarget && (loc.type === 'link' || loc.type === 'image')) {
                                        const locData = {
                                            type: loc.type,
                                            href: loc.type === 'link' ? loc.label : undefined,
                                            src: loc.type === 'image' ? loc.label : undefined,
                                            position: loc.hint ? this._extractPosition(loc.hint) : null,
                                            currentText: loc.currentText || loc.currentAlt || '',
                                        };
                                        const locDataAttr = this.escapeHtml(JSON.stringify(locData));
                                        return `<li class="loc-with-llm">
                                            <div class="loc-row">${labelHtml}${hintHtml}</div>
                                            <div class="loc-individual-llm" data-target="${individualLlmTarget}" data-location="${locDataAttr}">
                                                <button type="button" class="loc-llm-btn">✨ この項目を AI に書き換えてもらう</button>
                                                <div class="loc-llm-result" hidden></div>
                                            </div>
                                        </li>`;
                                    }
                                } else if (loc.type === 'structured-missing') {
                                    // 不足スキーマ: バッジ風に表示
                                    labelHtml = `<span class="loc-label loc-missing-schema">${this.escapeHtml(loc.label)}</span>`;
                                } else if (loc.type === 'structured') {
                                    // 構造化データ該当箇所: 折りたたみで JSON スニペット表示
                                    const snippetId = `sd-snippet-${idx}-${Math.abs(this._hashCode(loc.key))}`;
                                    const snippetHtml = loc.snippet
                                        ? `<details class="loc-jsonld-details"><summary>JSON-LD を表示</summary><pre class="loc-jsonld-snippet"><code>${this.escapeHtml(loc.snippet)}</code></pre></details>`
                                        : '';
                                    return `<li class="loc-structured">
                                        <div class="loc-structured-header">
                                            <span class="loc-label">${this.escapeHtml(loc.label)}</span>
                                            ${hintHtml}
                                        </div>
                                        ${snippetHtml}
                                    </li>`;
                                } else {
                                    labelHtml = `<span class="loc-label">${this.escapeHtml(loc.label)}</span>`;
                                }
                                return `<li>${labelHtml}${hintHtml}</li>`;
                            };
                            const visibleHtml = visibleItems.map(renderItem).join('');
                            const hiddenHtml = hiddenItems.map(renderItem).join('');
                            const moreToggle = hiddenItems.length > 0
                                ? `<button type="button" class="loc-toggle-more" data-loc-target="locs-${idx}">他 ${hiddenItems.length} 件を表示</button>
                                   <ul class="loc-list-hidden" id="locs-${idx}" hidden>${hiddenHtml}</ul>`
                                : '';
                            locationsBlock = `<div class="rec-locations">
                                <h4>該当箇所 (${locations.length}件)</h4>
                                <ul class="loc-list">${visibleHtml}</ul>
                                ${moreToggle}
                            </div>`;
                        }
                        // Phase 2-E.1: AI ボタンを最上部に配置、Phase 2-E.2: 該当箇所を AI ボタン直後に
                        const extra = hasDetails
                            ? `<div class="recommendation-extra" id="${detailsId}" style="display:none;">${llmButton}${issueLine}${locationsBlock}${codeBlock}${docLink}</div>`
                            : '';
                        // Phase 1.3: a11y — 開閉トグルがある行は <button>, ない行は <div>
                        const headerOpenTag = hasDetails
                            ? `<button type="button" class="recommendation-header" data-toggle="${detailsId}" aria-expanded="false" aria-controls="${detailsId}">`
                            : `<div class="recommendation-header">`;
                        const headerCloseTag = hasDetails ? `</button>` : `</div>`;
                        html += `
                            <div class="recommendation-item ${priorityClass}${llmTarget ? ' has-llm-suggest' : ''}">
                                ${headerOpenTag}
                                    <span class="checkmark" aria-hidden="true">✓</span>
                                    <span class="recommendation-text">${this.escapeHtml(rec.fix)}</span>
                                    ${llmAvailableBadge}
                                    <span class="priority-badge ${priorityClass}" aria-label="優先度: ${this.getPriorityTitle(rec.priority)}">${this.getPriorityTitle(rec.priority)}</span>
                                    ${toggle}
                                ${headerCloseTag}
                                <div class="recommendation-details">
                                    <span class="element-info">${this.escapeHtml(rec.element)}</span>
                                    <span class="location-info">${this.escapeHtml(rec.location)}</span>
                                    ${rec.count > 1 ? `<span class="count-info">${rec.count}件</span>` : ''}
                                    ${typeBadge}
                                </div>
                                ${extra}
                            </div>
                        `;
                    });
                    
                    // Phase 2-I: Critical/High なし = 良好なページの場合、達成感を表示
                    if (topRecs.length === 0) {
                        const okMessage = restCount > 0
                            ? `<div class="summary-all-good">
                                <p class="summary-all-good-icon">✨</p>
                                <p class="summary-all-good-title">Critical / High 優先度の問題はありません</p>
                                <p class="summary-all-good-sub">Medium/Low 優先度の改善候補が ${restCount} 件あります → <a href="#" class="goto-details-tab">詳細データタブ</a>で確認できます</p>
                            </div>`
                            : `<div class="summary-all-good">
                                <p class="summary-all-good-icon">🎉</p>
                                <p class="summary-all-good-title">すべての項目が良好です</p>
                                <p class="summary-all-good-sub">SEO / AIO ともに目立った改善点はありません。</p>
                            </div>`;
                        html += okMessage;
                    }
                    html += `
                            </div>
                        </div>
                    `;
                }
                
                summaryContent.innerHTML = html;
                this.attachRecommendationToggles();
                // Phase 2-E: AI 書き換え提案ボタンのイベントバインド
                this.attachLlmSuggestHandlers();
                // Phase 2-E.2: 該当箇所「他N件を表示」トグル
                this.attachLocationToggles();
                // Phase 2-G: 該当箇所ごとの個別 AI 書き換えボタン
                this.attachIndividualLlmHandlers();
                // Phase 2-I: 「詳細データタブへ」リンク
                document.querySelectorAll('.goto-details-tab').forEach(a => {
                    if (a.dataset.bound === '1') return;
                    a.dataset.bound = '1';
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.switchTab('details');
                    });
                });
            }

            // Phase 2-G: 該当箇所ごとの個別 AI 書き換えボタンのイベントバインド
            attachIndividualLlmHandlers() {
                document.querySelectorAll('.loc-llm-btn').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const wrap = btn.closest('.loc-individual-llm');
                        if (!wrap) return;
                        const target = wrap.dataset.target;
                        let locationData;
                        try {
                            locationData = JSON.parse(wrap.dataset.location);
                        } catch (_) {
                            locationData = null;
                        }
                        const resultBox = wrap.querySelector('.loc-llm-result');

                        btn.disabled = true;
                        const origLabel = btn.textContent;
                        btn.textContent = '⏳ AI に問い合わせ中...';
                        resultBox.hidden = false;
                        resultBox.innerHTML = '<p class="llm-loading">AI がこの項目専用の書き換え案を考えています…</p>';

                        try {
                            const res = await fetch('/api/llm/suggest', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    target,
                                    currentValue: locationData ? (locationData.currentText || '') : '',
                                    pageContext: this._lastPageContext || {},
                                    specificLocation: locationData,
                                }),
                            });
                            const data = await res.json();
                            if (!data.success) {
                                resultBox.innerHTML = '<p class="llm-error">' + this.escapeHtml(data.error || 'AI 提案の取得に失敗しました') + '</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ 再試行';
                                return;
                            }
                            const suggestions = (data.data && data.data.suggestions) || [];
                            if (suggestions.length === 0) {
                                resultBox.innerHTML = '<p class="llm-error">AI から提案を取得できませんでした</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ 再試行';
                                return;
                            }
                            let html = '<div class="loc-llm-suggestions">';
                            html += '<h6>この項目専用の AI 提案 (' + suggestions.length + '件)</h6>';
                            suggestions.forEach((s, i) => {
                                html += `
                                    <div class="loc-llm-suggestion">
                                        <div class="loc-llm-suggestion-header">
                                            <span class="loc-llm-suggestion-num">提案 ${i + 1}</span>
                                            <button type="button" class="loc-llm-suggestion-copy" data-copy="${this.escapeHtml(s.text)}">コピー</button>
                                        </div>
                                        <div class="loc-llm-suggestion-text">${this.escapeHtml(s.text)}</div>
                                        <div class="loc-llm-suggestion-reason">${this.escapeHtml(s.reason)}</div>
                                    </div>
                                `;
                            });
                            html += '</div>';
                            resultBox.innerHTML = html;

                            // コピー機能
                            resultBox.querySelectorAll('.loc-llm-suggestion-copy').forEach(copyBtn => {
                                copyBtn.addEventListener('click', async (ev) => {
                                    ev.stopPropagation();
                                    const text = copyBtn.dataset.copy || '';
                                    try {
                                        if (navigator.clipboard && navigator.clipboard.writeText) {
                                            await navigator.clipboard.writeText(text);
                                        } else {
                                            const ta = document.createElement('textarea');
                                            ta.value = text;
                                            document.body.appendChild(ta);
                                            ta.select();
                                            document.execCommand('copy');
                                            document.body.removeChild(ta);
                                        }
                                        const orig = copyBtn.textContent;
                                        copyBtn.textContent = 'コピー済み';
                                        copyBtn.classList.add('copied');
                                        setTimeout(() => {
                                            copyBtn.textContent = orig;
                                            copyBtn.classList.remove('copied');
                                        }, 1500);
                                    } catch (_) {}
                                });
                            });

                            btn.textContent = '✨ もう一度提案を取得';
                            btn.disabled = false;
                        } catch (err) {
                            resultBox.innerHTML = '<p class="llm-error">通信エラー: ' + this.escapeHtml(err.message || 'unknown') + '</p>';
                            btn.disabled = false;
                            btn.textContent = '✨ 再試行';
                        }
                    });
                });
            }

            // Phase 2-E.2: 該当箇所の '他N件を表示' トグル
            attachLocationToggles() {
                document.querySelectorAll('.loc-toggle-more').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetId = btn.dataset.locTarget;
                        const ul = document.getElementById(targetId);
                        if (!ul) return;
                        const isHidden = ul.hasAttribute('hidden');
                        if (isHidden) {
                            ul.removeAttribute('hidden');
                            btn.textContent = '閉じる';
                        } else {
                            ul.setAttribute('hidden', '');
                            const count = ul.querySelectorAll('li').length;
                            btn.textContent = '他 ' + count + ' 件を表示';
                        }
                    });
                });
            }

            // Phase 2-E: 推奨アクションの category から「現在の値」を抽出する
            _extractCurrentValue(rec, results) {
                if (!rec || !results || !results.checks) return '';
                const cat = rec.category;
                const checks = results.checks;
                if (cat === 'titleTag' && checks.titleTag) return checks.titleTag.current || '';
                if (cat === 'metaDescription' && checks.metaDescription) return checks.metaDescription.current || '';
                if (cat === 'headingStructure' && checks.headingStructure) {
                    return (checks.headingStructure.h1Texts || []).join(' / ');
                }
                // リンクテキスト / alt属性 は recommend 中の count 件あるので個別値は取れない
                // detailedAnalysis から取得できれば良いが、現状は空でOK (LLM が文脈から推測する)
                return '';
            }

            // Phase 2-E.2: 推奨アクションの該当箇所を detailedAnalysis から抽出する
            // 戻り値: [{ label: string, hint?: string, key: string }, ...]
            _extractLocations(rec, results) {
                if (!rec || !results) return [];
                const da = results.detailedAnalysis;
                if (!da) return [];
                const cat = rec.category;
                const issue = rec.issue || rec.fix || '';

                // 画像 alt 関連
                if (cat === 'imageAltAttributes' && da.imageAltAttributes && da.imageAltAttributes.specificIssues) {
                    // issue 文言から該当する specificIssue を選ぶ
                    let targetType = null;
                    if (/alt属性がありません|alt属性なし|alt 属性がない/i.test(issue)) targetType = 'missing_alt';
                    else if (/alt属性が空|空のalt/i.test(issue)) targetType = 'empty_alt';
                    else if (/alt属性が長すぎ|alt_length/i.test(issue)) targetType = 'alt_length';
                    else if (/不要な単語|alt_quality/i.test(issue)) targetType = 'alt_quality';
                    else if (/画像が存在しません/i.test(issue)) return []; // 該当画像なし

                    const matches = da.imageAltAttributes.specificIssues.filter(s =>
                        !targetType || s.type === targetType
                    );
                    const locations = [];
                    for (const m of matches) {
                        // images が単数 (src,position,current 直書き) と複数 (images[]) の2パターン
                        if (Array.isArray(m.images)) {
                            for (const img of m.images) {
                                locations.push({
                                    key: 'img:' + (img.src || '') + ':' + (img.position || ''),
                                    label: this._truncate(img.src || '(URL不明)', 80),
                                    hint: img.position ? '画像 ' + img.position + '番目' : null,
                                    type: 'image',
                                });
                            }
                        } else if (m.src) {
                            locations.push({
                                key: 'img:' + m.src + ':' + (m.position || ''),
                                label: this._truncate(m.src, 80),
                                hint: m.position ? '画像 ' + m.position + '番目' : null,
                                type: 'image',
                                currentAlt: m.current,
                            });
                        }
                    }
                    return this._dedupeLocations(locations);
                }

                // リンクテキスト関連
                if (cat === 'internalLinkStructure' && da.internalLinkStructure && da.internalLinkStructure.specificIssues) {
                    let targetType = null;
                    if (/リンクテキストが空|empty_text/i.test(issue)) targetType = 'empty_text';
                    else if (/汎用|generic_text/i.test(issue)) targetType = 'generic_text';
                    else if (/内部リンクが少な/i.test(issue)) return []; // 件数問題
                    else if (/外部リンクが存在しません/i.test(issue)) return [];

                    const matches = da.internalLinkStructure.specificIssues.filter(s =>
                        !targetType || s.type === targetType
                    );
                    const locations = [];
                    for (const m of matches) {
                        if (Array.isArray(m.links)) {
                            for (const lnk of m.links) {
                                locations.push({
                                    key: 'link:' + (lnk.href || '') + ':' + (lnk.position || ''),
                                    label: this._truncate(lnk.href || '(URL不明)', 80),
                                    hint: lnk.position ? 'リンク ' + lnk.position + '番目' : null,
                                    type: 'link',
                                    currentText: lnk.text,
                                });
                            }
                        }
                    }
                    return this._dedupeLocations(locations);
                }

                // 見出し関連
                if (cat === 'headingStructure' && da.headingStructure && da.headingStructure.specificIssues) {
                    const locations = [];
                    for (const s of da.headingStructure.specificIssues) {
                        // 空見出し, 重複見出し等で headingText / heading が含まれることがある
                        const txt = s.current || s.heading || s.headingText;
                        if (txt) {
                            locations.push({
                                key: 'heading:' + txt + ':' + (s.position || ''),
                                label: this._truncate(txt, 80),
                                hint: s.element ? s.element.toUpperCase() : null,
                                type: 'heading',
                            });
                        }
                    }
                    return this._dedupeLocations(locations);
                }

                // タイトル / メタディスクリプション (現在値を1件として表示)
                if (cat === 'titleTag' && da.titleTag && da.titleTag.specificIssues) {
                    const s = da.titleTag.specificIssues.find(x => x.current);
                    if (s && s.current) {
                        return [{
                            key: 'title:' + s.current,
                            label: this._truncate(s.current, 100),
                            hint: '現在のタイトル' + (s.length ? ' (' + s.length + '全角文字)' : ''),
                            type: 'title',
                        }];
                    }
                }
                if (cat === 'metaDescription' && da.metaDescription && da.metaDescription.specificIssues) {
                    const s = da.metaDescription.specificIssues.find(x => x.current);
                    if (s && s.current) {
                        return [{
                            key: 'meta:' + s.current,
                            label: this._truncate(s.current, 120),
                            hint: '現在のメタディスクリプション' + (s.length ? ' (' + s.length + '全角文字)' : ''),
                            type: 'meta',
                        }];
                    }
                }

                // Phase 2-F: 構造化データ関連
                if (cat === 'structuredData') {
                    return this._extractStructuredDataLocations(issue, results);
                }

                return [];
            }

            // Phase 2-F: 構造化データの該当箇所を抽出
            //
            // 入力:
            //   - issue: '○○スキーマに××がありません' / 'JSON-LD[N]に@typeがありません' /
            //            'JSON-LDの構文エラーがあります' / 'スキーマが不足しています' 等
            //   - results: 診断結果
            //     - results.detailedAnalysis.structuredData.jsonLd[] が {data, position, isValid} 形式 (理想)
            //     - フォールバックで results.checks.structuredData.jsonLd[] (生データ直格納)
            //
            // 戻り値: 該当する JSON-LD スニペット情報の配列
            _extractStructuredDataLocations(issue, results) {
                // 優先: detailedAnalysis (position/isValid/error 含む)
                let jsonLdList = [];
                const da = results.detailedAnalysis;
                if (da && da.structuredData && Array.isArray(da.structuredData.jsonLd)) {
                    jsonLdList = da.structuredData.jsonLd;
                } else if (results.checks && results.checks.structuredData && Array.isArray(results.checks.structuredData.jsonLd)) {
                    // フォールバック: 素データを {data, position} 形式にラップ
                    jsonLdList = results.checks.structuredData.jsonLd.map((item, idx) => ({
                        data: item,
                        position: idx + 1,
                        isValid: true,
                    }));
                }
                if (jsonLdList.length === 0 && !/不足しています$|構造化データが存在しません/.test(issue)) {
                    return [];
                }

                // === 1. 「○○スキーマに××がありません」パターン ===
                // 例: 'Organizationスキーマにnameがありません', 'Productスキーマにoffersがありません'
                const fieldMatch = issue.match(/^(\S+?)スキーマに(\S+?)がありません$/);
                if (fieldMatch) {
                    const schemaName = fieldMatch[1];
                    const fieldName = fieldMatch[2];
                    const matches = jsonLdList.filter(s => {
                        const t = s && s.data && s.data['@type'];
                        if (Array.isArray(t)) return t.includes(schemaName);
                        return t === schemaName;
                    });
                    return matches.map((s, i) => {
                        const snippet = this._formatJsonLdSnippet(s.data);
                        return {
                            key: 'sd:' + schemaName + ':' + i,
                            label: schemaName + ' スキーマ (フィールド「' + fieldName + '」が不足)',
                            hint: 'JSON-LD ' + (s.position || (i + 1)) + '番目',
                            type: 'structured',
                            snippet: snippet,
                            schemaName: schemaName,
                            missingField: fieldName,
                        };
                    });
                }

                // === 2. 「JSON-LD[N]に@typeがありません」パターン ===
                const noTypeMatch = issue.match(/^JSON-LD\[(\d+)\]に@typeがありません$/);
                if (noTypeMatch) {
                    const idx = parseInt(noTypeMatch[1], 10);
                    // detailedAnalyzer 側は 0-index、index.js 側は 0-index で push しているか不明なので両方試す
                    const candidates = [jsonLdList[idx], jsonLdList[idx - 1]].filter(Boolean);
                    return candidates.slice(0, 1).map((s, i) => ({
                        key: 'sd:notype:' + idx,
                        label: 'JSON-LD ' + (s.position || idx) + '番目 (@type 欠落)',
                        hint: '@type 必須',
                        type: 'structured',
                        snippet: this._formatJsonLdSnippet(s.data),
                    }));
                }

                // === 3. 「JSON-LDの構文エラーがあります」 / 「N番目のJSON-LDに構文エラー」 ===
                if (/JSON-LD.*構文エラー/i.test(issue)) {
                    const errors = jsonLdList.filter(s => s.isValid === false);
                    return errors.map((s, i) => ({
                        key: 'sd:syntax:' + i,
                        label: 'JSON-LD ' + (s.position || (i + 1)) + '番目 (構文エラー)',
                        hint: s.error ? this._truncate(s.error, 60) : '構文エラー',
                        type: 'structured',
                        snippet: s.error || '(JSON パース失敗)',
                    }));
                }

                // === 4. 「推奨スキーマが不足しています: A, B, C」 ===
                // この場合は不足リストを「不足項目」として表示 (該当箇所ではないがガイドとして)
                const missingMatch = issue.match(/^推奨スキーマが不足しています:\s*(.+)$/);
                if (missingMatch) {
                    const missing = missingMatch[1].split(/[,、,]/).map(s => s.trim()).filter(Boolean);
                    return missing.map((schema, i) => ({
                        key: 'sd:missing:' + schema,
                        label: schema + ' スキーマ (未実装)',
                        hint: '不足',
                        type: 'structured-missing',
                    }));
                }

                // === 5. 「LocalBusinessスキーマが不足しています」 等の単独スキーマ不足 ===
                // 該当 JSON-LD が存在しないので空配列を返す (UI は表示しない)
                if (/スキーマが不足しています$/.test(issue)) {
                    return [];
                }

                // === 6. 構造化データが存在しない ===
                if (/構造化データが存在しません/.test(issue)) {
                    return [];
                }

                return [];
            }

            // Phase 2-F: JSON-LD オブジェクトを短くフォーマット (UI 表示用)
            _formatJsonLdSnippet(data) {
                if (!data) return '(データなし)';
                try {
                    // フィールド数が多い場合は最初の8キーまで
                    const summary = {};
                    let count = 0;
                    for (const key of Object.keys(data)) {
                        if (count >= 8) {
                            summary['__truncated__'] = '... (他 ' + (Object.keys(data).length - count) + ' フィールド)';
                            break;
                        }
                        const v = data[key];
                        if (typeof v === 'string') {
                            summary[key] = this._truncate(v, 80);
                        } else if (Array.isArray(v)) {
                            summary[key] = '[Array (' + v.length + ')]';
                        } else if (typeof v === 'object' && v !== null) {
                            // ネストオブジェクトは @type だけ表示
                            summary[key] = v['@type'] ? '{@type: ' + v['@type'] + '...}' : '{...}';
                        } else {
                            summary[key] = v;
                        }
                        count++;
                    }
                    return JSON.stringify(summary, null, 2);
                } catch (_) {
                    return '(整形失敗)';
                }
            }

            // Phase 2-E.2: 重複除去 (key で一意化)
            _dedupeLocations(locations) {
                const seen = new Set();
                const out = [];
                for (const loc of locations) {
                    if (seen.has(loc.key)) continue;
                    seen.add(loc.key);
                    out.push(loc);
                }
                return out;
            }

            // Phase 2-E.2: 文字列短縮
            _truncate(s, max) {
                if (!s) return '';
                if (s.length <= max) return s;
                return s.slice(0, max - 1) + '…';
            }

            // Phase 2-F: 簡易ハッシュ (一意な DOM ID 生成用)
            _hashCode(s) {
                let h = 0;
                if (!s) return 0;
                for (let i = 0; i < s.length; i++) {
                    h = ((h << 5) - h + s.charCodeAt(i)) | 0;
                }
                return h;
            }

            // Phase 2-G: ヒント文字列 'リンク 38番目' から数値抽出
            _extractPosition(hint) {
                if (!hint) return null;
                const m = String(hint).match(/(\d+)/);
                return m ? parseInt(m[1], 10) : null;
            }

            // Phase 2-E: AI 書き換え提案ボタンのイベントバインド
            attachLlmSuggestHandlers() {
                document.querySelectorAll('.llm-suggest-btn').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const wrap = btn.closest('.rec-llm-suggest');
                        if (!wrap) return;
                        const target = wrap.dataset.llmTarget;
                        const label = wrap.dataset.llmLabel || '対象';
                        const currentValue = wrap.dataset.llmCurrent || '';
                        const resultBox = wrap.querySelector('.llm-suggest-result');

                        btn.disabled = true;
                        btn.textContent = '⏳ AI に問い合わせ中...';
                        resultBox.hidden = false;
                        resultBox.innerHTML = '<p class="llm-loading">AI が ' + this.escapeHtml(label) + ' の書き換え案を考えています…</p>';

                        try {
                            const res = await fetch('/api/llm/suggest', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    target,
                                    currentValue,
                                    pageContext: this._lastPageContext || {},
                                }),
                            });
                            const data = await res.json();
                            if (!data.success) {
                                resultBox.innerHTML = '<p class="llm-error">' + this.escapeHtml(data.error || 'AI 提案の取得に失敗しました') + '</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                                return;
                            }
                            const suggestions = (data.data && data.data.suggestions) || [];
                            if (suggestions.length === 0) {
                                resultBox.innerHTML = '<p class="llm-error">AI から提案を取得できませんでした</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                                return;
                            }
                            let html = '<div class="llm-suggestions-list">';
                            html += '<h5>AI 提案 (' + suggestions.length + '件)</h5>';
                            suggestions.forEach((s, i) => {
                                html += `
                                    <div class="llm-suggestion">
                                        <div class="llm-suggestion-header">
                                            <span class="llm-suggestion-num">提案 ${i + 1}</span>
                                            <button type="button" class="llm-suggestion-copy" data-copy="${this.escapeHtml(s.text)}">コピー</button>
                                        </div>
                                        <div class="llm-suggestion-text">${this.escapeHtml(s.text)}</div>
                                        <div class="llm-suggestion-reason">${this.escapeHtml(s.reason)}</div>
                                    </div>
                                `;
                            });
                            html += '</div>';
                            resultBox.innerHTML = html;

                            // コピー機能をバインド
                            resultBox.querySelectorAll('.llm-suggestion-copy').forEach(copyBtn => {
                                copyBtn.addEventListener('click', async (ev) => {
                                    ev.stopPropagation();
                                    const text = copyBtn.dataset.copy || '';
                                    try {
                                        if (navigator.clipboard && navigator.clipboard.writeText) {
                                            await navigator.clipboard.writeText(text);
                                        } else {
                                            const ta = document.createElement('textarea');
                                            ta.value = text;
                                            document.body.appendChild(ta);
                                            ta.select();
                                            document.execCommand('copy');
                                            document.body.removeChild(ta);
                                        }
                                        const orig = copyBtn.textContent;
                                        copyBtn.textContent = 'コピー済み';
                                        copyBtn.classList.add('copied');
                                        setTimeout(() => {
                                            copyBtn.textContent = orig;
                                            copyBtn.classList.remove('copied');
                                        }, 1500);
                                    } catch (_) {}
                                });
                            });

                            btn.textContent = '✨ もう一度提案を取得';
                            btn.disabled = false;
                        } catch (err) {
                            resultBox.innerHTML = '<p class="llm-error">通信エラー: ' + this.escapeHtml(err.message || 'unknown') + '</p>';
                            btn.disabled = false;
                            btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                        }
                    });
                });
            }

            // Phase 2-I: 旧 displayDetails + displayAIO を統合
            // 「詳細データ」タブ = 全データ閲覧ビュー
            //   - SEO カテゴリ + AIO カテゴリ を 1 ページに統合
            //   - 全推奨アクション (Critical/High/Medium/Low) を表示
            //   - 全該当箇所一覧 (画像 alt 全リスト、リンク全リスト等)
            displayDetailedData(results) {
                const detailsContent = document.getElementById('detailsContent');

                const seoCategories = [
                    { key: 'titleTag', name: 'タイトルタグ' },
                    { key: 'metaDescription', name: 'メタディスクリプション' },
                    { key: 'headingStructure', name: '見出し構造 (H1〜H6)' },
                    { key: 'imageAltAttributes', name: '画像の alt 属性' },
                    { key: 'internalLinkStructure', name: '内部リンク構造' },
                    { key: 'otherSEOElements', name: 'その他 SEO 要素' },
                ];
                const aioCategories = [
                    { key: 'contentComprehensiveness', name: 'コンテンツ包括性' },
                    { key: 'structuredInformation', name: '構造化情報' },
                    { key: 'credibilitySignals', name: '信頼性シグナル' },
                    { key: 'aiSearchOptimization', name: 'AI 検索最適化' },
                    { key: 'naturalLanguageQuality', name: '自然言語品質' },
                    { key: 'contextRelevance', name: 'コンテキスト関連性' },
                    { key: 'llmsTxtCompliance', name: 'llms.txt 対応' },
                ];

                // 全推奨アクション (Critical + High + Medium + Low すべて)
                const allRecs = results.conciseRecommendations || [];
                const recsByCategory = {};
                allRecs.forEach(rec => {
                    if (!recsByCategory[rec.category]) recsByCategory[rec.category] = [];
                    recsByCategory[rec.category].push(rec);
                });

                let html = '';

                // 上部: スコア+件数のオーバービュー
                const totalRecs = allRecs.length;
                const criticalCount = allRecs.filter(r => r.priority === 'critical').length;
                const highCount = allRecs.filter(r => r.priority === 'high').length;
                const mediumCount = allRecs.filter(r => r.priority === 'medium').length;
                const lowCount = allRecs.filter(r => r.priority === 'low').length;

                html += `
                    <div class="details-overview">
                        <h2>詳細データビュー</h2>
                        <p class="details-overview-desc">SEO・AIO 全カテゴリの詳細データと、全件の推奨アクション (優先度問わず) を確認できます。</p>
                        <div class="details-priority-summary">
                            <span class="prio-chip critical">Critical: ${criticalCount}</span>
                            <span class="prio-chip high">High: ${highCount}</span>
                            <span class="prio-chip medium">Medium: ${mediumCount}</span>
                            <span class="prio-chip low">Low: ${lowCount}</span>
                            <span class="prio-chip total">合計: ${totalRecs}</span>
                        </div>
                    </div>
                `;

                // Phase 2-I.1: セクション冒頭のスコア表示 (SEO/AIO 統一)
                const renderSectionScore = (label, score) => {
                    const scoreClass = this.getScoreClass(score || 0);
                    return `
                        <div class="details-section-score ${scoreClass}">
                            <div class="details-section-score-num">${score || 0}</div>
                            <div class="details-section-score-label">${label}</div>
                        </div>
                    `;
                };

                // SEO セクション (overallScore はルートに格納)
                const seoScore = typeof results.overallScore === 'number' ? results.overallScore : 0;
                html += '<section class="details-section">';
                html += '<h2 class="details-section-title">SEO 詳細</h2>';
                html += renderSectionScore('SEO総合スコア', seoScore);
                seoCategories.forEach(cat => {
                    html += this._renderDetailsCategory(cat.key, cat.name, results.checks[cat.key], recsByCategory[cat.key] || [], results);
                });
                html += '</section>';

                // AIO セクション (aio.overallScore に格納)
                if (results.aio) {
                    const aioScore = typeof results.aio.overallScore === 'number' ? results.aio.overallScore : 0;
                    html += '<section class="details-section">';
                    html += '<h2 class="details-section-title">AIO 詳細</h2>';
                    html += renderSectionScore('AIO総合スコア', aioScore);
                    aioCategories.forEach(cat => {
                        html += this._renderDetailsCategory(cat.key, cat.name, results.aio.checks[cat.key], recsByCategory[cat.key] || [], results);
                    });
                    html += '</section>';
                }

                detailsContent.innerHTML = html;

                // Phase 2-I: 詳細タブ内でも該当箇所トグルを動作させる
                this.attachLocationToggles();
                // 詳細タブの推奨アクション展開トグル
                detailsContent.querySelectorAll('.details-rec-toggle').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.target;
                        const box = document.getElementById(id);
                        if (!box) return;
                        const isHidden = box.hasAttribute('hidden');
                        if (isHidden) {
                            box.removeAttribute('hidden');
                            btn.textContent = '閉じる ▲';
                        } else {
                            box.setAttribute('hidden', '');
                            const c = btn.dataset.count || '';
                            btn.textContent = c ? `推奨アクション ${c} 件を表示 ▼` : '展開 ▼';
                        }
                    });
                });
            }

            // Phase 2-I: 1 カテゴリ分の詳細表示を組み立て
            _renderDetailsCategory(catKey, catName, check, recs, results) {
                if (!check) return '';
                const scoreClass = this.getScoreClass(check.score || 0);
                const currentHtml = check.current !== undefined
                    ? `<p class="details-current"><strong>現在の値:</strong> ${this.escapeHtml(String(check.current).slice(0, 300))}</p>`
                    : '';

                // 推奨アクション (全件、優先度の昇順=Critical→Low)
                const sortedRecs = recs.slice().sort((a, b) => {
                    const order = { critical: 0, high: 1, medium: 2, low: 3 };
                    return (order[a.priority] || 9) - (order[b.priority] || 9);
                });
                let recsHtml = '';
                if (sortedRecs.length > 0) {
                    const toggleId = `details-recs-${catKey}`;
                    recsHtml = `
                        <button type="button" class="details-rec-toggle" data-target="${toggleId}" data-count="${sortedRecs.length}">推奨アクション ${sortedRecs.length} 件を表示 ▼</button>
                        <div id="${toggleId}" hidden>
                            <ul class="details-rec-list">
                                ${sortedRecs.map(rec => `
                                    <li class="details-rec-item ${this.getPriorityClass(rec.priority)}">
                                        <div class="details-rec-header">
                                            <span class="priority-badge ${this.getPriorityClass(rec.priority)}">${this.getPriorityTitle(rec.priority)}</span>
                                            <span class="details-rec-text">${this.escapeHtml(rec.fix)}</span>
                                        </div>
                                        ${rec.issue ? `<p class="details-rec-issue">${this.escapeHtml(rec.issue)}</p>` : ''}
                                        ${rec.codeExample ? `<pre class="details-rec-code"><code>${this.escapeHtml(rec.codeExample)}</code></pre>` : ''}
                                        ${rec.docLink ? `<a href="${rec.docLink}" target="_blank" rel="noopener noreferrer" class="details-rec-doc">📖 参考ドキュメント →</a>` : ''}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                // 該当箇所一覧 (この詳細タブでは全件展開、フィルタなしのプレーン表示)
                const locations = this._collectAllLocations(catKey, check, results);
                let locationsHtml = '';
                if (locations.length > 0) {
                    locationsHtml = `
                        <div class="details-locations">
                            <h4>該当箇所一覧 (${locations.length}件)</h4>
                            <ul class="details-loc-list">
                                ${locations.map(loc => {
                                    const label = loc.label || '';
                                    const isAbs = /^https?:\/\//i.test(label);
                                    const labelHtml = isAbs
                                        ? `<a href="${this.escapeHtml(label)}" target="_blank" rel="noopener noreferrer" class="details-loc-url">${this.escapeHtml(label)}</a>`
                                        : `<code class="details-loc-code">${this.escapeHtml(label)}</code>`;
                                    const hint = loc.hint ? `<span class="details-loc-hint">${this.escapeHtml(loc.hint)}</span>` : '';
                                    return `<li>${labelHtml}${hint}</li>`;
                                }).join('')}
                            </ul>
                        </div>
                    `;
                }

                return `
                    <div class="details-category">
                        <div class="details-category-header">
                            <h3>${catName}</h3>
                            <span class="details-category-score ${scoreClass}">${check.score || 0}/100</span>
                        </div>
                        ${currentHtml}
                        ${recsHtml}
                        ${locationsHtml}
                    </div>
                `;
            }

            // Phase 2-I: カテゴリ内のすべての該当箇所を集約 (重複なし)
            // 既存の _extractLocations はrec単位だが、ここでは「カテゴリ全体」で集約
            _collectAllLocations(catKey, check, results) {
                const da = results.detailedAnalysis;
                if (!da) return [];
                const collected = [];

                if (catKey === 'imageAltAttributes' && da.imageAltAttributes && da.imageAltAttributes.specificIssues) {
                    da.imageAltAttributes.specificIssues.forEach(si => {
                        if (Array.isArray(si.images)) {
                            si.images.forEach(img => {
                                collected.push({
                                    key: 'img:' + (img.src || '') + ':' + (img.position || ''),
                                    label: img.src || '(URL不明)',
                                    hint: img.position ? `画像 ${img.position}番目 / ${si.type || ''}` : (si.type || ''),
                                });
                            });
                        } else if (si.src) {
                            collected.push({
                                key: 'img:' + si.src + ':' + (si.position || ''),
                                label: si.src,
                                hint: si.position ? `画像 ${si.position}番目 / ${si.type || ''}` : (si.type || ''),
                            });
                        }
                    });
                }
                if (catKey === 'internalLinkStructure' && da.internalLinkStructure && da.internalLinkStructure.specificIssues) {
                    da.internalLinkStructure.specificIssues.forEach(si => {
                        if (Array.isArray(si.links)) {
                            si.links.forEach(lnk => {
                                collected.push({
                                    key: 'link:' + (lnk.href || '') + ':' + (lnk.position || ''),
                                    label: lnk.href || '(URL不明)',
                                    hint: lnk.position ? `リンク ${lnk.position}番目 / ${si.type || ''}` : (si.type || ''),
                                });
                            });
                        }
                    });
                }
                if (catKey === 'headingStructure' && da.headingStructure && da.headingStructure.specificIssues) {
                    da.headingStructure.specificIssues.forEach(si => {
                        const txt = si.current || si.heading || si.headingText;
                        if (txt) {
                            collected.push({
                                key: 'heading:' + txt + ':' + (si.position || ''),
                                label: txt,
                                hint: si.element ? si.element.toUpperCase() : '',
                            });
                        }
                    });
                }

                // 重複除去
                const seen = new Set();
                return collected.filter(loc => {
                    if (seen.has(loc.key)) return false;
                    seen.add(loc.key);
                    return true;
                });
            }

            displayStructuredData(results) {
                const structuredDataContent = document.getElementById('structuredDataContent');
                const structuredDataCheck = results.checks.structuredData;
                
                if (!structuredDataCheck) {
                    structuredDataContent.innerHTML = '<p>構造化データのチェック結果がありません</p>';
                    return;
                }

                let html = `<div class="structured-data-analysis">`;

                // ページタイプ分析結果
                if (structuredDataCheck.pageTypeAnalysis) {
                    const analysis = structuredDataCheck.pageTypeAnalysis;
                    // Phase 1.7: 100超の保険 (page-type-analyzer 側で正規化済みだが旧データに備える)
                    const confidence = Math.min(100, Math.max(0, Math.round((analysis.confidence || 0) * 100)));
                    
                    // Phase 2-C: LLM 補正情報を表示
                    const llmInfo = structuredDataCheck.pageTypeAnalysis.llmCorrection;
                    const isLlm = llmInfo && llmInfo.applied === true;
                    const aiBadge = isLlm
                        ? '<span class="page-type-ai-badge" title="OpenAI GPT-4o-mini による判定">AI</span>'
                        : '';
                    // 判定根拠: LLM があればその reasoning、なければルールベースの根拠
                    const reasoningText = (analysis.analysisDetails && analysis.analysisDetails.reasoning)
                        || this.getAnalysisReason(analysis);
                    // 判定の決め手 (LLM のみ提供)
                    const matchedSignals = (analysis.analysisDetails && analysis.analysisDetails.matchedSignals) || [];

                    // Phase 1.7 + 2-C: シンプル&構造的なヘッダーカード
                    html += `
                        <div class="page-type-analysis">
                            <div class="page-type-header">
                                <span class="page-type-label">ページタイプ分析</span>
                                <h3 class="page-type-judgment">${this.escapeHtml(this.getPageTypeDisplayName(analysis.primaryType))}</h3>
                                <span class="page-type-confidence-badge" title="判定の信頼度">信頼度 ${confidence}%</span>
                                ${aiBadge}
                            </div>
                            <div class="page-type-details">
                                <div class="page-type-detail">
                                    <span class="page-type-detail-label">主要タイプ</span>
                                    <span class="page-type-detail-value mono">${this.escapeHtml(analysis.primaryType)}</span>
                                </div>
                                ${analysis.secondaryTypes && analysis.secondaryTypes.length > 0 ? `
                                    <div class="page-type-detail">
                                        <span class="page-type-detail-label">候補タイプ</span>
                                        <span class="page-type-detail-value mono">${this.escapeHtml(analysis.secondaryTypes.join(', '))}</span>
                                    </div>
                                ` : ''}
                                <div class="page-type-detail">
                                    <span class="page-type-detail-label">分析根拠</span>
                                    <span class="page-type-detail-value">${this.escapeHtml(reasoningText)}</span>
                                </div>
                                ${matchedSignals.length > 0 ? `
                                    <div class="page-type-detail page-type-detail-wide">
                                        <span class="page-type-detail-label">判定の決め手</span>
                                        <div class="page-type-signals">
                                            ${matchedSignals.map(s => `<span class="page-type-signal-chip">${this.escapeHtml(s)}</span>`).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                            ${isLlm && llmInfo.ruleBasedPrimaryType && llmInfo.ruleBasedPrimaryType !== analysis.primaryType ? `
                                <div class="page-type-rulebased-note">
                                    ルールベースの判定は <strong>${this.escapeHtml(this.getPageTypeDisplayName(llmInfo.ruleBasedPrimaryType))}</strong> (信頼度 ${Math.round((llmInfo.ruleBasedConfidence || 0) * 100)}%)。AI 判定がこれを上書きしました。
                                </div>
                            ` : ''}
                        </div>
                    `;
                }

                // 構造化データ推奨事項
                if (structuredDataCheck.structuredDataRecommendations) {
                    const recommendations = structuredDataCheck.structuredDataRecommendations;
                    
                    html += `<div class="schema-recommendations">`;

                    // 不足スキーマ（必須）
                    if (recommendations.recommendations.missing.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3 class="schema-section-title">
                                    <span class="schema-section-marker schema-marker-critical">必須</span>
                                    必要なスキーマ (${recommendations.recommendations.missing.length}件)
                                </h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.missing.forEach((item, index) => {
                            const schemaId = `missing_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    // 推奨スキーマ
                    if (recommendations.recommendations.improvements.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3 class="schema-section-title">
                                    <span class="schema-section-marker schema-marker-recommended">推奨</span>
                                    追加すると効果的なスキーマ (${recommendations.recommendations.improvements.length}件)
                                </h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.improvements.forEach((item, index) => {
                            const schemaId = `improvement_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    // オプションスキーマ
                    if (recommendations.recommendations.optional.length > 0) {
                        html += `
                            <div class="schema-section">
                                <h3 class="schema-section-title">
                                    <span class="schema-section-marker schema-marker-optional">参考</span>
                                    余力があれば追加 (${recommendations.recommendations.optional.length}件)
                                </h3>
                                <div class="schema-items">
                        `;
                        
                        recommendations.recommendations.optional.forEach((item, index) => {
                            const schemaId = `optional_${index}`;
                            html += this.generateSchemaItem(item, schemaId, structuredDataCheck);
                        });
                        
                        html += `
                                </div>
                            </div>
                        `;
                    }

                    html += `</div>`; // schema-recommendations

                    // 期待される効果 (Phase 1.7: Claw 風に統一)
                    if (recommendations.expectedBenefits) {
                        const benefits = recommendations.expectedBenefits;
                        html += `
                            <div class="expected-benefits">
                                <h3 class="schema-section-title">期待される効果</h3>
                                <div class="benefits-grid">
                                    <div class="benefit-item">
                                        <div class="benefit-percentage">${this.escapeHtml(String(benefits.richSnippets.probability))}%</div>
                                        <div class="benefit-description">${this.escapeHtml(benefits.richSnippets.description)}</div>
                                    </div>
                                    <div class="benefit-item">
                                        <div class="benefit-percentage benefit-positive">+${this.escapeHtml(String(benefits.searchRanking.improvement))}%</div>
                                        <div class="benefit-description">${this.escapeHtml(benefits.searchRanking.description)}</div>
                                    </div>
                                    <div class="benefit-item">
                                        <div class="benefit-percentage benefit-positive">+${this.escapeHtml(String(benefits.clickThroughRate.improvement))}%</div>
                                        <div class="benefit-description">${this.escapeHtml(benefits.clickThroughRate.description)}</div>
                                    </div>
                                    ${benefits.localSearch ? `
                                        <div class="benefit-item">
                                            <div class="benefit-percentage benefit-positive">+${this.escapeHtml(String(benefits.localSearch.visibility))}%</div>
                                            <div class="benefit-description">${this.escapeHtml(benefits.localSearch.description)}</div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }
                }

                html += `</div>`; // structured-data-analysis

                structuredDataContent.innerHTML = html;
                // Phase 1.7: スキーマカードのトグル + コピーボタンを attach
                this.attachSchemaCardHandlers();
            }

            // Phase 1.7: スキーマカードの開閉とコードコピー
            attachSchemaCardHandlers() {
                document.querySelectorAll('[data-schema-toggle]').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.schemaToggle;
                        const body = document.getElementById('schema-body-' + id);
                        if (!body) return;
                        const isOpen = !body.hasAttribute('hidden');
                        if (isOpen) {
                            body.setAttribute('hidden', '');
                            btn.setAttribute('aria-expanded', 'false');
                            const icon = btn.querySelector('.schema-toggle-icon');
                            if (icon) icon.textContent = '▼';
                        } else {
                            body.removeAttribute('hidden');
                            btn.setAttribute('aria-expanded', 'true');
                            const icon = btn.querySelector('.schema-toggle-icon');
                            if (icon) icon.textContent = '▲';
                        }
                    });
                });
                document.querySelectorAll('[data-schema-copy]').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.schemaCopy;
                        const codeEl = document.getElementById(id);
                        if (!codeEl) return;
                        const text = codeEl.innerText;
                        try {
                            if (navigator.clipboard && navigator.clipboard.writeText) {
                                await navigator.clipboard.writeText(text);
                            } else {
                                // フォールバック
                                const ta = document.createElement('textarea');
                                ta.value = text;
                                document.body.appendChild(ta);
                                ta.select();
                                document.execCommand('copy');
                                document.body.removeChild(ta);
                            }
                            const orig = btn.textContent;
                            btn.textContent = 'コピー済み';
                            btn.classList.add('copied');
                            setTimeout(() => {
                                btn.textContent = orig;
                                btn.classList.remove('copied');
                            }, 1500);
                        } catch (err) {
                            console.error('コピー失敗:', err);
                        }
                    });
                });
            }

            generateSchemaItem(item, schemaId, structuredDataCheck) {
                // 実装例を取得（あれば）
                let implementationCode = '';
                if (structuredDataCheck.implementationExamples &&
                    structuredDataCheck.implementationExamples.templates &&
                    structuredDataCheck.implementationExamples.templates[item.schema]) {
                    const template = structuredDataCheck.implementationExamples.templates[item.schema];
                    if (template.schema) {
                        implementationCode = JSON.stringify(template.schema, null, 2);
                    }
                }

                // Phase 1.7: script タグで包んだ完全なスニペットを生成（改行・インデント付き）
                // 注: 親の script タグ内なので、文字列リテラル中の閉じタグは
                //     エスケープ ('<' + '/script>') して書かないと HTML パーサが終了してしまう
                const SCRIPT_OPEN = '<script type="application/ld+json">';
                const SCRIPT_CLOSE = '<' + '/script>';
                const fullCodeSnippet = implementationCode
                    ? SCRIPT_OPEN + '\n' + implementationCode + '\n' + SCRIPT_CLOSE
                    : '';

                const benefits = this.getImplementationBenefits(item.schema);
                const time = this.getEstimatedTime(item.schema);

                return `
                    <div class="schema-card" data-schema-id="${schemaId}">
                        <button type="button" class="schema-card-header" data-schema-toggle="${schemaId}" aria-expanded="false" aria-controls="schema-body-${schemaId}">
                            <span class="schema-card-name">${this.escapeHtml(item.schema)}</span>
                            <span class="schema-priority ${item.priority}">${this.getPriorityTitle(item.priority)}</span>
                            ${item.seoValue != null ? `<span class="schema-meta">SEO値 <strong>${item.seoValue}</strong></span>` : ''}
                            ${time ? `<span class="schema-meta">実装目安 <strong>${this.escapeHtml(time)}</strong></span>` : ''}
                            <span class="schema-toggle-icon" aria-hidden="true">▼</span>
                        </button>
                        <div class="schema-card-body" id="schema-body-${schemaId}" hidden>
                            ${item.reason ? `
                                <div class="schema-section-block">
                                    <div class="schema-block-label">推奨理由</div>
                                    <p class="schema-block-text">${this.escapeHtml(item.reason)}</p>
                                </div>
                            ` : ''}
                            ${fullCodeSnippet ? `
                                <div class="schema-section-block">
                                    <div class="schema-block-label-row">
                                        <span class="schema-block-label">実装コード例</span>
                                        <button type="button" class="schema-copy-btn" data-schema-copy="code_${schemaId}">コピー</button>
                                    </div>
                                    <pre class="schema-code"><code id="code_${schemaId}">${this.escapeHtml(fullCodeSnippet)}</code></pre>
                                </div>
                            ` : ''}
                            <div class="schema-section-block">
                                <div class="schema-block-label">検証ツール</div>
                                <ul class="schema-validation-list">
                                    <li><a href="https://search.google.com/test/rich-results" target="_blank" rel="noopener noreferrer">Google リッチリザルトテスト</a><span class="schema-validation-note">Google での認識を確認</span></li>
                                    <li><a href="https://validator.schema.org/" target="_blank" rel="noopener noreferrer">Schema.org Validator</a><span class="schema-validation-note">仕様準拠を確認</span></li>
                                </ul>
                            </div>
                            ${benefits && benefits.length > 0 ? `
                                <div class="schema-section-block">
                                    <div class="schema-block-label">実装メリット</div>
                                    <ul class="schema-benefits-list">
                                        ${benefits.map(b => `<li>${this.escapeHtml(b)}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            getPageTypeDisplayName(pageType) {
                const displayNames = {
                    Article: '記事・ブログ',
                    Product: '商品ページ',
                    LocalBusiness: '店舗・企業',
                    Recipe: 'レシピ',
                    Event: 'イベント',
                    FAQ: 'よくある質問',
                    HowTo: '手順・ガイド',
                    Review: 'レビュー',
                    JobPosting: '求人情報',
                    Course: 'コース・講座'
                };
                return displayNames[pageType] || pageType;
            }

            getAnalysisReason(analysis) {
                if (analysis.analysisDetails && analysis.analysisDetails.matchedPatterns) {
                    const patterns = analysis.analysisDetails.matchedPatterns;
                    const reasons = [];
                    
                    if (patterns.keywords && patterns.keywords.length > 0) {
                        reasons.push(`キーワード: ${patterns.keywords.slice(0, 3).join(', ')}`);
                    }
                    if (patterns.titlePatterns && patterns.titlePatterns.length > 0) {
                        reasons.push(`タイトルパターン: ${patterns.titlePatterns.slice(0, 2).join(', ')}`);
                    }
                    if (patterns.urlPatterns && patterns.urlPatterns.length > 0) {
                        reasons.push(`URLパターン: ${patterns.urlPatterns.slice(0, 2).join(', ')}`);
                    }
                    
                    return reasons.join(', ') || '内容分析による判定';
                }
                
                return '内容分析による判定';
            }

            getEstimatedTime(schema) {
                const times = {
                    Article: '30分',
                    Product: '1-2時間',
                    LocalBusiness: '1時間',
                    Recipe: '2-3時間',
                    Event: '1時間',
                    FAQPage: '30分',
                    HowTo: '2-3時間',
                    Review: '30分',
                    JobPosting: '1時間',
                    Course: '1-2時間'
                };
                return times[schema] || '1時間';
            }

            getImplementationBenefits(schema) {
                const benefits = {
                    Article: [
                        'Googleニュースでの露出向上',
                        'リッチスニペット表示の可能性',
                        'author情報の表示'
                    ],
                    Product: [
                        '商品リッチスニペット表示',
                        '価格・在庫情報の表示',
                        'レビュー星評価の表示'
                    ],
                    LocalBusiness: [
                        'Googleマップでの表示改善',
                        '営業時間の表示',
