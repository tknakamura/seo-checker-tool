                        'ローカル検索での上位表示'
                    ],
                    Recipe: [
                        'レシピリッチスニペット表示',
                        '調理時間・カロリー表示',
                        'レシピ検索での優遇'
                    ]
                };
                
                return benefits[schema] || ['SEO効果の向上', '検索結果での目立ち度アップ'];
            }

            getPriorityTitle(priority) {
                const titles = {
                    critical: 'Critical',
                    high: 'High',
                    medium: 'Medium',
                    low: 'Low'
                };
                return titles[priority] || priority;
            }


            getScoreClass(score) {
                if (score >= 90) return 'score-excellent';
                if (score >= 70) return 'score-good';
                if (score >= 50) return 'score-fair';
                return 'score-poor';
            }

            getStatusClass(status) {
                if (status === '要緊急対応') return 'status-critical';
                if (status === '良好') return 'status-good';
                if (status === '改善必要') return 'status-warning';
                return 'status-poor';
            }

            getCategoryTitle(category) {
                const titles = {
                    titleTag: 'タイトルタグ',
                    metaDescription: 'メタディスクリプション',
                    headingStructure: '見出し構造',
                    imageAltAttributes: '画像alt属性',
                    internalLinkStructure: '内部リンク構造',
                    structuredData: '構造化データ',
                    otherSEOElements: 'その他SEO要素',
                    contentComprehensiveness: 'コンテンツ包括性',
                    structuredInformation: '構造化情報',
                    credibilitySignals: '信頼性シグナル',
                    aiSearchOptimization: 'AI検索最適化',
                    naturalLanguageQuality: '自然言語品質',
                    contextRelevance: 'コンテキスト関連性',
                    llmsTxtCompliance: 'llms.txt 対応'
                };
                return titles[category] || category;
            }

            getIssueTypeLabel(type) {
                const labels = {
                    missing: '存在しない',
                    length: '長さの問題',
                    duplicate: '重複',
                    format: '形式の問題',
                    quality: '品質の問題',
                    hierarchy: '階層の問題',
                    empty: '空の要素',
                    count: '数の問題',
                    missing_alt: 'alt属性なし',
                    empty_alt: '空のalt属性',
                    alt_length: 'alt属性の長さ',
                    alt_quality: 'alt属性の品質',
                    internal_count: '内部リンク数',
                    external_missing: '外部リンクなし',
                    empty_text: '空のリンクテキスト',
                    generic_text: '汎用的なリンクテキスト',
                    jsonld_syntax: 'JSON-LD構文エラー',
                    missing_schema: 'スキーマ不足',
                    protocol: 'プロトコル',
                    depth: 'ディレクトリの深さ',
                    viewport_content: 'viewport内容',
                    noindex: 'noindex設定'
                };
                return labels[type] || type;
            }

            getPriorityClass(priority) {
                const classes = {
                    critical: 'critical',
                    high: 'high',
                    medium: 'medium',
                    low: 'low'
                };
                return classes[priority] || 'medium';
            }

            escapeHtml(str) {
                if (str == null) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            attachRecommendationToggles() {
                document.querySelectorAll('.recommendation-header[data-toggle]').forEach(el => {
                    if (el.dataset.bound === '1') return;
                    el.dataset.bound = '1';
                    el.addEventListener('click', (e) => {
                        // 内部リンクのクリックは無視
                        if (e.target.tagName === 'A') return;
                        const targetId = el.dataset.toggle;
                        const panel = document.getElementById(targetId);
                        const icon = el.querySelector('.toggle-icon');
                        if (!panel) return;
                        const isOpen = panel.style.display !== 'none';
                        panel.style.display = isOpen ? 'none' : 'block';
                        if (icon) icon.textContent = isOpen ? '▼' : '▲';
                        // Phase 1.3: a11y — aria-expanded を実際の状態に追従
                        // ボタン化していない場合（fallback）でも setAttribute は安全
                        el.setAttribute('aria-expanded', String(!isOpen));
                    });
                });
                // 展開エリア内のクリックは折りたたみ伝播を止める（コピー可能に）
                document.querySelectorAll('.recommendation-extra').forEach(el => {
                    if (el.dataset.bound === '1') return;
                    el.dataset.bound = '1';
                    el.addEventListener('click', (e) => e.stopPropagation());
                });
            }

            switchTab(tabName) {
                // タブボタンの切り替え
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

                // タブコンテンツの切り替え
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');
            }

            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('checkBtn').disabled = show;
            }

            showResults() {
                document.getElementById('resultsContainer').style.display = 'block';
            }

            hideResults() {
                document.getElementById('resultsContainer').style.display = 'none';
            }

            showError(message) {
                this.showMessage(message, 'error');
            }

            showSuccess(message) {
                this.showMessage(message, 'success');
            }

            showMessage(message, type) {
                // 既存のメッセージを削除
                const existingMessage = document.querySelector('.error-message, .success-message');
                if (existingMessage) {
                    existingMessage.remove();
                }

                const messageDiv = document.createElement('div');
                messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
                messageDiv.textContent = message;

                document.querySelector('.form-container').insertBefore(messageDiv, document.querySelector('.form-container').firstChild);

                // 3秒後にメッセージを削除
                setTimeout(() => {
                    messageDiv.remove();
                }, 3000);
            }

            clearForm() {
                document.getElementById('seoCheckForm').reset();
                this.hideResults();
            }
        }

        // グローバルヘルパー関数
        function toggleSchemaContent(schemaId) {
            const content = document.getElementById(schemaId);
            if (content) {
                content.classList.toggle('active');
            }
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                const text = element.textContent || element.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    // 一時的にボタンのテキストを変更
                    const button = event.target;
                    const originalText = button.textContent;
                    button.textContent = '✅ コピー完了！';
                    button.style.background = '#28a745';
                    
                    setTimeout(() => {
                        button.textContent = originalText;
                        button.style.background = '';
                    }, 2000);
                }).catch(err => {
                    console.error('コピーに失敗しました:', err);
                    alert('コピーに失敗しました。手動でコピーしてください。');
                });
            }
        }

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            new SEOCheckerApp();
            // Phase 2-B: フッタの動的バージョン取得
            loadVersionInfo();
        });

        // フッタに /api/version の結果を反映する。失敗時は静かにフォールバックを残す。
        async function loadVersionInfo() {
            try {
                const res = await fetch('/api/version', { headers: { 'Accept': 'application/json' } });
                if (!res.ok) return;
                const data = await res.json();
                const vEl = document.getElementById('appVersion');
                const lEl = document.getElementById('appLicense');
                if (vEl && data.version) vEl.textContent = 'v' + data.version;
                if (lEl && data.license) lEl.textContent = data.license + ' License';
            } catch (_) {
                // ネットワーク不可時はフォールバック表示 (v — / — License) のまま
            }
        }
    </script>
</body>
</html>
