<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO・AIOチェックツール - Mercari Japan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 10px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .results h2 {
            color: #333;
            margin-bottom: 1rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 0.5rem;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .metric.good {
            border-left-color: #28a745;
        }

        .metric.warning {
            border-left-color: #ffc107;
        }

        .metric.error {
            border-left-color: #dc3545;
        }

        .metric-label {
            font-weight: 600;
            color: #555;
        }

        .metric-value {
            font-weight: 700;
            color: #333;
        }

        .recommendations {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .recommendations h3 {
            color: #0066cc;
            margin-bottom: 0.5rem;
        }

        .recommendations ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .recommendations li {
            margin: 0.5rem 0;
            color: #333;
        }

        .issues {
            background: #ffe6e6;
            border: 1px solid #ffb3b3;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .issues h3 {
            color: #cc0000;
            margin-bottom: 0.5rem;
        }

        .issues ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .issues li {
            margin: 0.5rem 0;
            color: #333;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border: 1px solid #c3e6cb;
        }

        .batch-results {
            margin-top: 2rem;
        }

        .url-result {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .url-result h3 {
            color: #495057;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }

        .url-result .status {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .url-result .status.success {
            background: #d4edda;
            color: #155724;
        }

        .url-result .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        /* タブスタイル */
        .tab-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .tab-header {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .tab-button {
            flex: 1;
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #e9ecef;
            color: #495057;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            padding: 2rem;
        }

        .tab-content.active {
            display: block;
        }

        .tab-section {
            margin-bottom: 2rem;
        }

        .tab-section h3 {
            color: #333;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e9ecef;
        }

        .score-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .score-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .score-card.good {
            border-left-color: #28a745;
        }

        .score-card.warning {
            border-left-color: #ffc107;
        }

        .score-card.error {
            border-left-color: #dc3545;
        }

        .score-card h4 {
            margin: 0 0 0.5rem 0;
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-card .score {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        .score-card .score.good {
            color: #28a745;
        }

        .score-card .score.warning {
            color: #ffc107;
        }

        .score-card .score.error {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-container {
                padding: 1rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SEO・AIOチェックツール</h1>
            <p>WebページのSEO最適化とAI最適化を包括的にチェックします</p>
        </div>

        <div class="form-container">
            <form id="seoCheckForm">
                <div class="form-group">
                    <label for="keywords">重要なキーワード <span style="color: #e74c3c;">*</span></label>
                    <input type="text" id="keywords" name="keywords" placeholder="誕生日,プレゼント,20代,男性" required>
                    <small style="color: #666; font-size: 0.9rem; margin-top: 0.5rem; display: block;">
                        💡 複数のキーワードはカンマで区切って入力してください（最大4語まで）。例：誕生日,プレゼント,20代,男性
                    </small>
                </div>

                <div class="form-group">
                    <label for="url">WebページURL</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="urls">または複数URL（バッチチェック）</label>
                    <textarea id="urls" name="urls" placeholder="複数のURLを1行ずつ入力してください&#10;https://example.com&#10;https://example2.com&#10;https://example3.com" style="min-height: 100px;"></textarea>
                </div>

                <div class="form-group">
                    <label for="html">またはHTMLコンテンツ（オプション）</label>
                    <textarea id="html" name="html" placeholder="HTMLコンテンツを直接貼り付ける場合はこちらに記入してください"></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="checkBtn">
                        SEOチェック実行
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        クリア
                    </button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>SEOチェックを実行中...</p>
        </div>

        <div class="results" id="results" style="display: none;">
            <h2>チェック結果</h2>
            <div class="tab-container">
                <div class="tab-header">
                    <button class="tab-button active" data-tab="overview">総合評価</button>
                    <button class="tab-button" data-tab="seo">SEO</button>
                    <button class="tab-button" data-tab="aio">AIO</button>
                </div>
                
                <div class="tab-content active" id="overview-tab">
                    <div id="overviewContent"></div>
                </div>
                
                <div class="tab-content" id="seo-tab">
                    <div class="tab-section">
                        <h3>タイトル・ディスクリプション</h3>
                        <div id="titleDescContent"></div>
                    </div>
                    <div class="tab-section">
                        <h3>見出し</h3>
                        <div id="headingContent"></div>
                    </div>
                    <div class="tab-section">
                        <h3>構造化データ</h3>
                        <div id="structuredDataContent"></div>
                    </div>
                </div>
                
                <div class="tab-content" id="aio-tab">
                    <div id="aioContent"></div>
                </div>
            </div>
        </div>
            </div>
    <script>
        document.getElementById('seoCheckForm').addEventListener('submit', function(e) {
                    e.preventDefault();
            runSEOCheck();
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('seoCheckForm').reset();
            document.getElementById('results').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
        });

        // タブ機能
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', function() {
                const tabId = this.getAttribute('data-tab');
                
                // すべてのタブボタンとコンテンツからactiveクラスを削除
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                
                // クリックされたタブをアクティブにする
                this.classList.add('active');
                document.getElementById(tabId + '-tab').classList.add('active');
            });
        });

        async function runSEOCheck() {
            const url = document.getElementById('url').value.trim();
            const urls = document.getElementById('urls').value.trim();
            const html = document.getElementById('html').value.trim();
            const keywordsInput = document.getElementById('keywords').value.trim();

            // キーワードの検証
            if (!keywordsInput) {
                alert('重要なキーワードを入力してください。');
                return;
            }

            const keywordList = keywordsInput.split(',').map(k => k.trim()).filter(k => k.length > 0);
            
            if (keywordList.length === 0) {
                alert('有効なキーワードを入力してください。');
                return;
            }

            if (keywordList.length > 4) {
                alert('キーワードは最大4語までです。現在の数: ' + keywordList.length);
                return;
            }

            // 入力検証
                if (!url && !urls && !html) {
                alert('URL、複数URL、またはHTMLコンテンツのいずれかを入力してください。');
                    return;
                }

            if (url && urls) {
                alert('単一URLと複数URLは同時に使用できません。');
                return;
            }

            if (url && html) {
                alert('単一URLとHTMLコンテンツは同時に使用できません。');
                return;
            }

            if (urls && html) {
                alert('複数URLとHTMLコンテンツは同時に使用できません。');
                return;
            }

            // ローディング表示
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';

                try {
                    let response;
                let data;
                    
                if (urls) {
                        // バッチチェック
                    const urlList = urls.split('\n').map(u => u.trim()).filter(u => u.length > 0);
                        if (urlList.length === 0) {
                        throw new Error('有効なURLが入力されていません。');
                        }

                        response = await fetch('/api/check/batch', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                        body: JSON.stringify({
                            urls: urlList,
                            keywords: keywordList
                        })
                        });
                    } else {
                        // 単一チェック
                        response = await fetch('/api/check/seo', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                        body: JSON.stringify({
                            url: url || null,
                            html: html || null,
                            keywords: keywordList
                        })
                    });
                }

                data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'チェック中にエラーが発生しました。');
                }

                displayResults(data);
                } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultsContent').innerHTML = `
                    <div class="error">
                        <h3>エラーが発生しました</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                document.getElementById('results').style.display = 'block';
                } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(data) {
            if (data.batchResults) {
                // バッチ結果の表示
                let html = '<div class="batch-results">';
                html += '<h2>バッチチェック結果</h2>';
                
                data.batchResults.forEach((result, index) => {
                    const statusClass = result.success ? 'success' : 'error';
                    const statusText = result.success ? '成功' : 'エラー';
                    
                    html += `
                        <div class="url-result">
                            <h3>${result.url}</h3>
                            <span class="status ${statusClass}">${statusText}</span>
                            ${result.success ? formatTabbedResult(result.data) : `<p>エラー: ${result.error}</p>`}
                        </div>
                    `;
                });
                
                html += '</div>';
                document.getElementById('overviewContent').innerHTML = html;
            } else {
                // 単一結果の表示 - タブ形式で表示
                const resultData = data.data || data;
                displayTabbedResults(resultData);
            }
            
            document.getElementById('results').style.display = 'block';
        }

        function displayTabbedResults(data) {
            // 総合評価タブ
            document.getElementById('overviewContent').innerHTML = formatOverviewTab(data);
            
            // SEOタブ
            document.getElementById('titleDescContent').innerHTML = formatTitleDescriptionSection(data);
            document.getElementById('headingContent').innerHTML = formatHeadingSection(data);
            document.getElementById('structuredDataContent').innerHTML = formatStructuredDataSection(data);
            
            // AIOタブ
            document.getElementById('aioContent').innerHTML = formatAioTab(data);
        }

        function formatOverviewTab(data) {
            let html = '';
            
            // 基本情報
            if (data.url) {
                html += `<div class="metric">
                    <span class="metric-label">URL</span>
                    <span class="metric-value">${data.url}</span>
                </div>`;
            }

            // スコアサマリー
            html += '<div class="score-summary">';
            
            if (data.overallScore !== undefined) {
                const overallClass = data.overallScore >= 80 ? 'good' : data.overallScore >= 60 ? 'warning' : 'error';
                html += `
                    <div class="score-card ${overallClass}">
                        <h4>総合スコア</h4>
                        <p class="score ${overallClass}">${data.overallScore}/100</p>
                    </div>
                `;
            }

            if (data.checks && data.checks.titleTag) {
                const titleClass = data.checks.titleTag.score >= 80 ? 'good' : data.checks.titleTag.score >= 60 ? 'warning' : 'error';
                html += `
                    <div class="score-card ${titleClass}">
                        <h4>タイトルタグ</h4>
                        <p class="score ${titleClass}">${data.checks.titleTag.score}/100</p>
                    </div>
                `;
            }

            if (data.checks && data.checks.metaDescription) {
                const descClass = data.checks.metaDescription.score >= 80 ? 'good' : data.checks.metaDescription.score >= 60 ? 'warning' : 'error';
                html += `
                    <div class="score-card ${descClass}">
                        <h4>メタディスクリプション</h4>
                        <p class="score ${descClass}">${data.checks.metaDescription.score}/100</p>
                    </div>
                `;
            }

            if (data.checks && data.checks.headingStructure) {
                const headingClass = data.checks.headingStructure.score >= 80 ? 'good' : data.checks.headingStructure.score >= 60 ? 'warning' : 'error';
                html += `
                    <div class="score-card ${headingClass}">
                        <h4>見出し構造</h4>
                        <p class="score ${headingClass}">${data.checks.headingStructure.score}/100</p>
                    </div>
                `;
            }

            html += '</div>';

            // 主要な推奨事項
            if (data.recommendations && data.recommendations.length > 0) {
                html += '<div class="tab-section">';
                html += '<h3>主要な推奨事項</h3>';
                html += '<div class="recommendations">';
                html += '<ul>';
                data.recommendations.slice(0, 5).forEach(rec => {
                    html += `<li>${rec.recommendations[0]}</li>`;
                });
                html += '</ul>';
                html += '</div>';
                html += '</div>';
            }

            return html;
        }

        function formatTitleDescriptionSection(data) {
            let html = '';
            
            // タイトルタグ
            if (data.checks && data.checks.titleTag) {
                const titleTag = data.checks.titleTag;
                const titleClass = titleTag.score >= 80 ? 'good' : titleTag.score >= 60 ? 'warning' : 'error';
                
                html += `
                    <div class="metric ${titleClass}">
                        <span class="metric-label">タイトルタグスコア</span>
                        <span class="metric-value">${titleTag.score}/100</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">タイトル</span>
                        <span class="metric-value">${titleTag.current || 'なし'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">文字数</span>
                        <span class="metric-value">${titleTag.length}文字</span>
                    </div>
                `;

                if (titleTag.issues && titleTag.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h4>タイトルタグの問題</h4>
                            <ul>
                                ${titleTag.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (titleTag.recommendations && titleTag.recommendations.length > 0) {
                    html += `
                        <div class="recommendations">
                            <h4>タイトルタグの推奨事項</h4>
                            <ul>
                                ${titleTag.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }

            // メタディスクリプション
            if (data.checks && data.checks.metaDescription) {
                const metaDesc = data.checks.metaDescription;
                const descClass = metaDesc.score >= 80 ? 'good' : metaDesc.score >= 60 ? 'warning' : 'error';
                
                html += `
                    <div class="metric ${descClass}">
                        <span class="metric-label">メタディスクリプションスコア</span>
                        <span class="metric-value">${metaDesc.score}/100</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">ディスクリプション</span>
                        <span class="metric-value">${metaDesc.current || 'なし'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">文字数</span>
                        <span class="metric-value">${metaDesc.length}文字</span>
                    </div>
                `;

                if (metaDesc.issues && metaDesc.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h4>メタディスクリプションの問題</h4>
                            <ul>
                                ${metaDesc.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (metaDesc.recommendations && metaDesc.recommendations.length > 0) {
                    html += `
                        <div class="recommendations">
                            <h4>メタディスクリプションの推奨事項</h4>
                            <ul>
                                ${metaDesc.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }

            return html;
        }

        function formatHeadingSection(data) {
            let html = '';
            
            if (data.checks && data.checks.headingStructure) {
                const heading = data.checks.headingStructure;
                const h1Class = heading.h1Count === 1 ? 'good' : heading.h1Count === 0 ? 'error' : 'warning';
                
                html += `
                    <div class="metric ${h1Class}">
                        <span class="metric-label">h1タグ数</span>
                        <span class="metric-value">${heading.h1Count}個</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">h2タグ数</span>
                        <span class="metric-value">${heading.h2Count}個</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">h3タグ数</span>
                        <span class="metric-value">${heading.h3Count}個</span>
                    </div>
                `;

                if (heading.h1Texts && heading.h1Texts.length > 0) {
                    html += `
                        <div class="metric">
                            <span class="metric-label">h1タグ内容</span>
                            <span class="metric-value">${heading.h1Texts.join(', ')}</span>
                        </div>
                    `;
                }

                if (heading.issues && heading.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h4>見出し構造の問題</h4>
                            <ul>
                                ${heading.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (heading.recommendations && heading.recommendations.length > 0) {
                    html += `
                        <div class="recommendations">
                            <h4>見出し構造の推奨事項</h4>
                            <ul>
                                ${heading.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }

            return html;
        }

        function formatStructuredDataSection(data) {
            let html = '';
            
            if (data.checks && data.checks.structuredData) {
                const structured = data.checks.structuredData;
                const structClass = structured.score >= 80 ? 'good' : structured.score >= 60 ? 'warning' : 'error';
                
                html += `
                    <div class="metric ${structClass}">
                        <span class="metric-label">構造化データスコア</span>
                        <span class="metric-value">${structured.score}/100</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">JSON-LD</span>
                        <span class="metric-value">${structured.jsonLd.length}個</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Microdata</span>
                        <span class="metric-value">${structured.microdata.length}個</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">RDFa</span>
                        <span class="metric-value">${structured.rdfa.length}個</span>
                    </div>
                `;

                if (structured.issues && structured.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h4>構造化データの問題</h4>
                            <ul>
                                ${structured.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (structured.recommendations && structured.recommendations.length > 0) {
                    html += `
                        <div class="recommendations">
                            <h4>構造化データの推奨事項</h4>
                            <ul>
                                ${structured.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }

            return html;
        }

        function formatAioTab(data) {
            let html = '';
            
            if (data.aio) {
                html += `
                    <div class="metric">
                        <span class="metric-label">AIO総合スコア</span>
                        <span class="metric-value">${data.aio.overallScore}/100</span>
                    </div>
                `;

                if (data.aio.checks) {
                    Object.entries(data.aio.checks).forEach(([key, value]) => {
                        const aioClass = value.score >= 80 ? 'good' : value.score >= 60 ? 'warning' : 'error';
                        html += `
                            <div class="metric ${aioClass}">
                                <span class="metric-label">${key}</span>
                                <span class="metric-value">${value.score}/100</span>
                            </div>
                        `;
                    });
                }
            }

            return html;
        }

        function formatSingleResult(data) {
            let html = '';
                
            // 基本情報
            if (data.url) {
                html += `<div class="metric">
                    <span class="metric-label">URL</span>
                    <span class="metric-value">${data.url}</span>
                </div>`;
            }

            // 全体スコア
            if (data.overallScore !== undefined) {
                const overallClass = data.overallScore >= 80 ? 'good' : data.overallScore >= 60 ? 'warning' : 'error';
                    html += `
                    <div class="metric ${overallClass}">
                        <span class="metric-label">総合スコア</span>
                        <span class="metric-value">${data.overallScore}/100</span>
                        </div>
                    `;
            }

            // タイトルタグ
            if (data.checks && data.checks.titleTag) {
                const titleTag = data.checks.titleTag;
                const titleClass = titleTag.score >= 80 ? 'good' : titleTag.score >= 60 ? 'warning' : 'error';
                html += `
                    <div class="metric ${titleClass}">
                        <span class="metric-label">タイトルタグ</span>
                        <span class="metric-value">${titleTag.score}/100</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">タイトル</span>
                        <span class="metric-value">${titleTag.current || 'なし'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">文字数</span>
                        <span class="metric-value">${titleTag.length}文字</span>
                    </div>
                `;
                
                if (titleTag.issues && titleTag.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h3>タイトルタグの問題</h3>
                            <ul>
                                ${titleTag.issues.map(issue => `<li>${issue}</li>`).join('')}
                                    </ul>
                        </div>
                    `;
                }

                if (titleTag.recommendations && titleTag.recommendations.length > 0) {
                    html += `
                        <div class="recommendations">
                            <h3>タイトルタグの推奨事項</h3>
                            <ul>
                                ${titleTag.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                        </div>
                    `;
                }
            }

            // メタディスクリプション
            if (data.checks && data.checks.metaDescription) {
                const metaDesc = data.checks.metaDescription;
                const descClass = metaDesc.score >= 80 ? 'good' : metaDesc.score >= 60 ? 'warning' : 'error';
                        html += `
                    <div class="metric ${descClass}">
                        <span class="metric-label">メタディスクリプション</span>
                        <span class="metric-value">${metaDesc.score}/100</span>
                                    </div>
                    <div class="metric">
                        <span class="metric-label">ディスクリプション</span>
                        <span class="metric-value">${metaDesc.current || 'なし'}</span>
                                    </div>
                    <div class="metric">
                        <span class="metric-label">文字数</span>
                        <span class="metric-value">${metaDesc.length}文字</span>
                                </div>
                            `;

                if (metaDesc.issues && metaDesc.issues.length > 0) {
                        html += `
                        <div class="issues">
                            <h3>メタディスクリプションの問題</h3>
                            <ul>
                                ${metaDesc.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                            </div>
                        `;
                    }

                if (metaDesc.recommendations && metaDesc.recommendations.length > 0) {
                html += `
                        <div class="recommendations">
                            <h3>メタディスクリプションの推奨事項</h3>
                            <ul>
                                ${metaDesc.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                                        </ul>
                    </div>
                `;
                }
            }

            // h1タグ
            if (data.checks && data.checks.headingStructure) {
                const heading = data.checks.headingStructure;
                const h1Class = heading.h1Count === 1 ? 'good' : heading.h1Count === 0 ? 'error' : 'warning';
                    html += `
                    <div class="metric ${h1Class}">
                        <span class="metric-label">h1タグ数</span>
                        <span class="metric-value">${heading.h1Count}個</span>
                            </div>
                        `;
                    
                if (heading.h1Texts && heading.h1Texts.length > 0) {
                    html += `
                        <div class="metric">
                            <span class="metric-label">h1タグ内容</span>
                            <span class="metric-value">${heading.h1Texts.join(', ')}</span>
                        </div>
                    `;
                }
                
                if (heading.issues && heading.issues.length > 0) {
                    html += `
                        <div class="issues">
                            <h3>見出し構造の問題</h3>
                            <ul>
                                ${heading.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (heading.recommendations && heading.recommendations.length > 0) {
                html += `
                        <div class="recommendations">
                            <h3>見出し構造の推奨事項</h3>
                            <ul>
                                ${heading.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                    </div>
                `;
                }
            }

            // パフォーマンス
            if (data.performance) {
                if (data.performance.score !== undefined) {
                    const perfClass = data.performance.score >= 90 ? 'good' : data.performance.score >= 50 ? 'warning' : 'error';
                    html += `
                        <div class="metric ${perfClass}">
                            <span class="metric-label">パフォーマンススコア</span>
                            <span class="metric-value">${data.performance.score}/100</span>
                        </div>
                    `;
                }

                if (data.performance.metrics) {
                    Object.entries(data.performance.metrics).forEach(([key, value]) => {
                    html += `
                            <div class="metric">
                                <span class="metric-label">${key}</span>
                                <span class="metric-value">${value}</span>
                        </div>
                    `;
                });
                }

                if (data.performance.error) {
                html += `
                        <div class="error">
                            <h3>パフォーマンスチェックエラー</h3>
                            <p>${data.performance.error}</p>
                        </div>
                    `;
                }
            }

            return html;
        }
    </script>
</body>
</html>
