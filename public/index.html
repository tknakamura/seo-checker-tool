<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO AIO Doctor - SEO・AIO総合診断ツール</title>

    <!-- Favicon: SVG をモダンブラウザ向けに優先、PNG/ICO はフォールバック -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#2563eb">

    <style>
        /* =========================================================
           SEO AIO Doctor — Claw inspired theme (Phase 1.2)
           ベース: 白/淡グレー、彩度控えめ、影なし、角丸8px統一
           ========================================================= */
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --surface-2: #f3f4f6;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --text: #111827;
            --text-muted: #6b7280;
            --text-subtle: #9ca3af;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --accent-border: #bfdbfe;
            --critical: #b91c1c;
            --critical-bg: #fef2f2;
            --high: #b45309;
            --high-bg: #fffbeb;
            --medium: #6b7280;
            --medium-bg: #f9fafb;
            --low: #9ca3af;
            --low-bg: #fafafa;
            --good: #047857;
            --good-bg: #ecfdf5;
            --radius: 8px;
            --radius-sm: 6px;
            --gap: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { font-family: inherit; }

        ::selection { background: var(--accent-soft); }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ---- Header ---- */
        .header {
            text-align: center;
            padding: 24px 0 32px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 0.92rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ---- Card / Section ---- */
        .form-container,
        .results-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        /* ---- Form ---- */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            color: var(--text);
            background: var(--bg);
            transition: border-color .15s ease, box-shadow .15s ease;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .form-group textarea { min-height: 140px; resize: vertical; }

        .check-type-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .check-type-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }
        .check-type-option {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            cursor: pointer;
            background: var(--bg);
            transition: border-color .15s ease, background .15s ease;
        }
        .check-type-option:hover { border-color: var(--accent-border); background: var(--accent-soft); }
        .check-type-option.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .option-icon { font-size: 1.2rem; margin-bottom: 4px; opacity: 0.7; }
        .option-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
        .option-desc { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            padding: 10px 18px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s ease, border-color .15s ease;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border-strong);
        }
        .btn-secondary:hover { background: var(--surface-2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ---- Loading ---- */
        .loading {
            display: none;
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .spinner {
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* ---- Score display ---- */
        .score-display {
            text-align: center;
            padding: 28px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
        }
        .score-number {
            font-size: 3rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .score-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }

        /* ---- Tabs ---- */
        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color .15s ease, border-color .15s ease;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ---- Section / Category ---- */
        .summary-section { margin-bottom: 28px; }
        .summary-section h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.005em;
        }
        .category {
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 14px;
        }
        .category h3 {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }

        /* ---- Score chip ---- */
        .category-score {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .score-excellent { background: var(--good-bg); color: var(--good); border-color: #a7f3d0; }
        .score-good      { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
        .score-fair      { background: var(--high-bg); color: var(--high); border-color: #fde68a; }
        .score-poor      { background: var(--critical-bg); color: var(--critical); border-color: #fecaca; }

        /* ---- Score grid (summary 3 cards) ---- */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .score-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 14px;
            text-align: center;
        }
        .score-item .score-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin: 0 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .score-item .score-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .score-value.score-excellent { color: var(--good); }
        .score-value.score-good { color: var(--accent); }
        .score-value.score-fair { color: var(--high); }
        .score-value.score-poor { color: var(--critical); }

        /* ---- Issues / recommendations list ---- */
        .issues-list, .recommendations-list { margin-top: 12px; }
        .issues-list h4, .recommendations-list h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .issues-list ul, .recommendations-list ul {
            list-style: none;
            padding: 0;
        }
        .issues-list li, .recommendations-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.92rem;
            color: var(--text);
        }
        .issues-list li:last-child, .recommendations-list li:last-child { border-bottom: none; }
        .issues-list li::before { content: "·"; color: var(--critical); margin-right: 8px; font-weight: bold; }
        .recommendations-list li::before { content: "·"; color: var(--good); margin-right: 8px; font-weight: bold; }

        /* ---- Recommendation card (Phase 1) ---- */
        .recommendation-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: border-color .15s ease;
            overflow: hidden;
        }
        .recommendation-item:hover { border-color: var(--border-strong); }
        .recommendation-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            width: 100%;
            text-align: left;
            font: inherit;
            color: inherit;
            background: transparent;
            border: none;
        }
        .recommendation-header[data-toggle] { cursor: pointer; }
        .recommendation-header[data-toggle]:hover { background: var(--surface); }
        /* a11y: フォーカス時の表示（キーボード操作用） */
        .recommendation-header:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
            background: var(--surface);
        }
        .checkmark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--surface-2);
            color: var(--text-muted);
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .recommendation-text {
            flex: 1;
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.5;
        }
        .priority-badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: var(--bg);
            white-space: nowrap;
        }
        .priority-badge.critical { color: var(--critical); border-color: #fecaca; background: var(--critical-bg); }
        .priority-badge.high     { color: var(--high); border-color: #fde68a; background: var(--high-bg); }
        .priority-badge.medium   { color: var(--medium); border-color: var(--border); background: var(--medium-bg); }
        .priority-badge.low      { color: var(--low); border-color: var(--border); background: var(--low-bg); }
        .toggle-icon {
            color: var(--text-subtle);
            font-size: 0.75rem;
            user-select: none;
            flex-shrink: 0;
        }
        .recommendation-details {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 14px 12px 42px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .element-info, .location-info, .count-info {
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface-2);
            color: var(--text-muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
        }
        .count-info { font-family: inherit; }
        .type-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .type-badge.type-seo { background: var(--accent-soft); color: var(--accent); }
        .type-badge.type-aio { background: #f5f3ff; color: #6d28d9; }

        .recommendation-extra {
            padding: 14px;
            margin: 0 14px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .rec-issue {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .rec-issue strong { color: var(--text); font-weight: 600; }
        .rec-code { margin-bottom: 10px; }
        .rec-code h4 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .rec-code pre {
            background: #f8f8f8;
            border: 1px solid var(--border);
            color: #1f2937;
            padding: 12px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .rec-code code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: inherit;
            background: transparent;
            padding: 0;
            white-space: pre;
        }
        .rec-doc a {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Phase 2-E: LLM 書き換え提案ボタン & 結果表示 */
        .rec-llm-suggest {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }
        .llm-suggest-btn {
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s ease;
        }
        .llm-suggest-btn:hover { opacity: 0.9; }
        .llm-suggest-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .llm-suggest-result {
            margin-top: 10px;
        }
        .llm-suggest-result .llm-loading {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
            padding: 8px 0;
        }
        .llm-suggest-result .llm-error {
            color: var(--critical);
            background: var(--critical-bg);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            border: 1px solid #fecaca;
        }
        .llm-suggestions-list h5 {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .llm-suggestion {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
        }
        .llm-suggestion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .llm-suggestion-num {
            font-size: 0.72rem;
            color: var(--accent);
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
        }
        .llm-suggestion-copy {
            padding: 3px 10px;
            font-size: 0.78rem;
            background: var(--bg);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: background .15s ease;
        }
        .llm-suggestion-copy:hover { background: var(--surface-2); }
        .llm-suggestion-copy.copied {
            background: var(--good-bg);
            color: var(--good);
            border-color: #a7f3d0;
        }
        .llm-suggestion-text {
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.5;
            padding: 8px 10px;
            background: var(--surface);
            border-radius: 4px;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .llm-suggestion-reason {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .hint {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* ---- Warning banner ---- */
        .warnings-banner { margin: 0 0 18px; }
        .warning-item {
            background: var(--high-bg);
            border: 1px solid #fde68a;
            border-left: 3px solid var(--high);
            color: #78350f;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            margin-bottom: 8px;
        }
        .warning-item strong {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: var(--high);
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        .warning-item details { margin-top: 8px; font-size: 0.82rem; }
        .warning-item details summary { cursor: pointer; color: var(--high); font-weight: 500; }
        .warning-item details code {
            display: block;
            margin-top: 6px;
            background: rgba(0,0,0,0.04);
            padding: 6px 8px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.8rem;
            color: #78350f;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ---- Error / Success messages ---- */
        .error-message {
            background: var(--critical-bg);
            color: var(--critical);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .success-message {
            background: var(--good-bg);
            color: var(--good);
            border: 1px solid #a7f3d0;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        /* ---- Phase 1.7: 構造化データタブを完全リデザイン ---- */
        .structured-data-analysis { max-width: 100%; }

        /* ページタイプ分析カード */
        .page-type-analysis {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 24px;
        }
        .page-type-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .page-type-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }
        .page-type-judgment {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.01em;
        }
        .page-type-confidence-badge {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--accent);
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            padding: 3px 10px;
            border-radius: 999px;
            font-weight: 500;
        }
        /* Phase 2-C: AI 判定バッジ */
        .page-type-ai-badge {
            font-size: 0.7rem;
            color: white;
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            padding: 3px 10px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.06em;
        }
        .page-type-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        /* Phase 2-C: 判定の決め手は横幅広めで表示 */
        .page-type-detail-wide {
            grid-column: 1 / -1;
        }
        .page-type-signals {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }
        .page-type-signal-chip {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent-border);
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
        }
        .page-type-rulebased-note {
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--text-subtle);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .page-type-rulebased-note strong { color: var(--text); }
        .page-type-detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .page-type-detail-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .page-type-detail-value {
            font-size: 0.92rem;
            color: var(--text);
        }
        .page-type-detail-value.mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.85rem;
        }

        /* セクションヘッダー（必須/推奨/参考） */
        .schema-section { margin-bottom: 28px; }
        .schema-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }
        .schema-section-marker {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            letter-spacing: 0.04em;
        }
        .schema-marker-critical { color: var(--critical); background: var(--critical-bg); border-color: #fecaca; }
        .schema-marker-recommended { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-border); }
        .schema-marker-optional { color: var(--text-muted); background: var(--surface); }

        /* スキーマカード */
        .schema-items {
            display: grid;
            gap: 10px;
        }
        .schema-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color .15s ease;
        }
        .schema-card:hover { border-color: var(--border-strong); }
        .schema-card-header {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg);
            border: none;
            cursor: pointer;
            font: inherit;
            color: inherit;
            text-align: left;
            flex-wrap: wrap;
        }
        .schema-card-header:hover { background: var(--surface); }
        .schema-card-header:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
            background: var(--surface);
        }
        .schema-card-name {
            font-weight: 600;
            font-size: 0.98rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--text);
            margin-right: auto;
        }
        .schema-priority {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 500;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .schema-priority.critical { color: var(--critical); background: var(--critical-bg); border-color: #fecaca; }
        .schema-priority.high     { color: var(--high); background: var(--high-bg); border-color: #fde68a; }
        .schema-priority.medium   { color: var(--medium); background: var(--medium-bg); border-color: var(--border); }
        .schema-priority.low      { color: var(--low); background: var(--low-bg); border-color: var(--border); }
        .schema-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .schema-meta strong {
            color: var(--text);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .schema-toggle-icon {
            color: var(--text-subtle);
            font-size: 0.75rem;
            user-select: none;
            margin-left: 4px;
        }

        /* スキーマカード本体 */
        .schema-card-body {
            padding: 14px 16px 18px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .schema-section-block {
            margin-bottom: 16px;
        }
        .schema-section-block:last-child {
            margin-bottom: 0;
        }
        .schema-block-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .schema-block-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .schema-block-text {
            font-size: 0.9rem;
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        /* コードブロック (重要！) */
        .schema-code {
            background: #f8f8f8;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin: 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            color: #1f2937;
            overflow-x: auto;
            white-space: pre;
            tab-size: 2;
        }
        .schema-code code {
            background: transparent;
            color: inherit;
            padding: 0;
            font-family: inherit;
        }
        .schema-copy-btn {
            padding: 4px 12px;
            font-size: 0.78rem;
            background: var(--bg);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: background .15s ease;
        }
        .schema-copy-btn:hover { background: var(--surface-2); }
        .schema-copy-btn.copied {
            background: var(--good-bg);
            color: var(--good);
            border-color: #a7f3d0;
        }

        /* 検証ツールリスト */
        .schema-validation-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 6px;
        }
        .schema-validation-list li {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 0.88rem;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .schema-validation-list a {
            color: var(--accent);
            font-weight: 500;
        }
        .schema-validation-note {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* 実装メリットリスト */
        .schema-benefits-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 4px;
        }
        .schema-benefits-list li {
            font-size: 0.88rem;
            color: var(--text);
            padding-left: 16px;
            position: relative;
        }
        .schema-benefits-list li::before {
            content: "·";
            position: absolute;
            left: 4px;
            color: var(--good);
            font-weight: bold;
        }

        /* 期待される効果カード (Phase 1.7) */
        .expected-benefits {
            margin-top: 24px;
            padding: 20px 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .expected-benefits .schema-section-title {
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .benefit-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
        }
        .benefit-percentage {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .benefit-percentage.benefit-positive {
            color: var(--good);
        }
        .benefit-description {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }
        @media (max-width: 720px) {
            .benefits-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ---- Phase 2-B: 比較対象URL欄 ---- */
        .compare-group {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border-left: 3px solid var(--accent);
        }
        .compare-group label {
            color: var(--text);
            font-weight: 500;
        }
        .label-optional {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.78rem;
            margin-left: 4px;
        }
        .form-hint {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ---- Phase 2-B: 比較結果UI ---- */
        .compare-verdict-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .verdict-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            text-align: center;
        }
        .verdict-card.winner-primary {
            border-color: #a7f3d0;
            background: var(--good-bg);
        }
        .verdict-card.winner-competitor {
            border-color: #fecaca;
            background: var(--critical-bg);
        }
        .verdict-card.winner-tie {
            border-color: var(--border);
            background: var(--surface);
        }
        .verdict-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .verdict-scores {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }
        .verdict-vs {
            color: var(--text-subtle);
            font-size: 0.85rem;
            font-weight: 400;
            margin: 0 6px;
        }
        .verdict-mine { color: var(--text); }
        .verdict-them { color: var(--text-muted); }
        .verdict-diff {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .winner-primary .verdict-diff { color: var(--good); }
        .winner-competitor .verdict-diff { color: var(--critical); }
        .winner-tie .verdict-diff { color: var(--text-muted); }
        .verdict-result {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* 勝率バー */
        .compare-winrate {
            display: grid;
            gap: 8px;
        }
        .winrate-row {
            display: grid;
            grid-template-columns: 140px 1fr 80px;
            align-items: center;
            gap: 12px;
            font-size: 0.88rem;
        }
        .winrate-label { color: var(--text-muted); }
        .winrate-bar {
            display: block;
            height: 8px;
            background: var(--surface-2);
            border-radius: 999px;
            overflow: hidden;
        }
        .winrate-fill {
            display: block;
            height: 100%;
            border-radius: 999px;
            transition: width .3s ease;
        }
        .winrate-fill.winrate-primary { background: var(--good); }
        .winrate-fill.winrate-competitor { background: var(--critical); }
        .winrate-fill.winrate-tie { background: var(--text-subtle); }
        .winrate-count {
            text-align: right;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        /* ギャップ表示 */
        .compare-gap-list {
            display: grid;
            gap: 6px;
        }
        .compare-gap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--critical-bg);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
        }
        .compare-gap-item.compare-advantage {
            background: var(--good-bg);
            border-color: #a7f3d0;
        }
        .compare-gap-name {
            font-weight: 500;
            color: var(--text);
        }
        .compare-gap-scores {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .score-arrow { color: var(--text-subtle); }
        .score-diff {
            font-weight: 600;
            margin-left: 4px;
        }
        .diff-positive { color: var(--good); }
        .diff-negative { color: var(--critical); }
        .diff-tie { color: var(--text-muted); }

        /* カテゴリ差分テーブル */
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .compare-table th, .compare-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        .compare-table th {
            background: var(--surface);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .compare-table .num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .compare-table tr.winner-primary td:last-child { color: var(--good); font-weight: 500; }
        .compare-table tr.winner-competitor td:last-child { color: var(--critical); font-weight: 500; }
        .compare-table tr.winner-tie td:last-child { color: var(--text-muted); }

        /* ---- Phase 2-B: Footer (LIKEPASS) ---- */
        .site-footer {
            max-width: 920px;
            margin: 48px auto 0;
            padding: 24px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
        }
        .site-footer .footer-logo {
            display: inline-flex;
            align-items: center;
            opacity: 0.75;
            transition: opacity .15s ease;
            line-height: 0;
        }
        .site-footer .footer-logo:hover,
        .site-footer .footer-logo:focus-visible {
            opacity: 1;
        }
        .site-footer .footer-logo:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
            border-radius: 4px;
        }
        .site-footer .footer-logo img {
            display: block;
            width: auto;
            height: 20px;
        }
        .site-footer .footer-credit {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .site-footer .footer-main {
            font-weight: 500;
            color: var(--text);
            margin: 0;
        }
        .site-footer .footer-meta {
            margin: 2px 0 0;
            font-size: 0.78rem;
            letter-spacing: 0.02em;
        }
        .site-footer .footer-sep {
            margin: 0 6px;
            opacity: 0.6;
        }

        /* ---- Responsive ---- */
        @media (max-width: 720px) {
            .container { padding: 20px 16px 48px; }
            .header h1 { font-size: 1.35rem; }
            .check-type-options { grid-template-columns: 1fr; }
            .score-grid { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            .button-group .btn { width: 100%; }
            .summary-cards { grid-template-columns: 1fr; }
            .quick-wins-grid { grid-template-columns: 1fr; }
            .implementation-details { grid-template-columns: 1fr; }
            .impact-cards { grid-template-columns: 1fr; }
            /* フッタはモバイルだと縦並びに */
            .site-footer {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 16px;
                padding: 24px 16px;
            }
            .site-footer .footer-logo {
                justify-self: center;
            }
            /* Phase 2-B: 比較ビューのレスポンシブ */
            .compare-verdict-grid { grid-template-columns: 1fr; }
            .winrate-row { grid-template-columns: 100px 1fr 60px; gap: 8px; font-size: 0.82rem; }
            .compare-gap-item { flex-direction: column; align-items: flex-start; gap: 4px; }
            .compare-table { font-size: 0.8rem; }
            .compare-table th, .compare-table td { padding: 8px 6px; }
        }
    </style>

</head>
<body>
    <div class="container">
        <header class="header">
            <h1>SEO AIO Doctor</h1>
            <p>WebページのSEOとAI検索最適化（AIO）を診断し、具体的な改善コードを提示します</p>
        </header>

        <div class="form-container">
            <form id="seoCheckForm">
                <div class="form-group">
                    <label for="url">WebページURL</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com">
                </div>

                <!-- Phase 2-B: 比較対象URL (オプション) -->
                <div class="form-group compare-group">
                    <label for="competitorUrl">
                        比較対象URL <span class="label-optional">（オプション）</span>
                    </label>
                    <input type="url" id="competitorUrl" name="competitorUrl"
                        placeholder="https://competitor.example.com"
                        autocomplete="off">
                    <p class="form-hint">入力すると、自分のサイトと並べてスコアを比較できます</p>
                </div>

                <div class="form-group">
                    <label for="html">またはHTMLコンテンツ（オプション）</label>
                    <textarea id="html" name="html" placeholder="HTMLコンテンツを直接貼り付ける場合はこちらに記入してください"></textarea>
                </div>

                <div class="form-group">
                    <label class="check-type-label">チェックタイプを選択してください</label>
                    <div class="check-type-options">
                        <div class="check-type-option" data-type="simple">
                            <div class="option-title">Simple</div>
                            <div class="option-desc">高速。静的HTMLのみ取得</div>
                        </div>
                        <div class="check-type-option active" data-type="advanced">
                            <div class="option-title">Advanced</div>
                            <div class="option-desc">JavaScript実行後に診断（SPA対応）</div>
                        </div>
                    </div>
                    <input type="hidden" id="waitForJS" name="waitForJS" value="true">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="checkBtn">
                        診断する
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        クリア
                    </button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>診断中...</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="tabs">
                <button class="tab active" data-tab="summary">サマリー</button>
                <button class="tab" data-tab="details">SEO詳細</button>
                <button class="tab" data-tab="aio">AIO詳細</button>
                <button class="tab" data-tab="structured-data">構造化データ</button>
            </div>

            <div class="tab-content active" id="summary">
                <div id="summaryContent"></div>
            </div>

            <div class="tab-content" id="details">
                <div id="detailsContent"></div>
            </div>

            <div class="tab-content" id="aio">
                <div id="aioContent"></div>
            </div>

            <div class="tab-content" id="structured-data">
                <div id="structuredDataContent"></div>
            </div>
        </div>
    </div>

    <!-- Phase 2-B: フッタ。LIKEPASS ロゴ + クレジット + 動的バージョン -->
    <footer class="site-footer">
        <a class="footer-logo"
           href="https://likepass.net"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="LIKEPASS — 運営企業のウェブサイトを新しいタブで開く">
            <img src="/assets/likepass.webp" alt="LIKEPASS" width="72" height="20" loading="lazy">
        </a>
        <div class="footer-credit">
            <p class="footer-main">Developed by TK Nakamura</p>
            <p class="footer-meta">
                <span id="appVersion">v —</span>
                <span class="footer-sep" aria-hidden="true">·</span>
                <span id="appLicense">— License</span>
            </p>
        </div>
    </footer>

    <script>
        class SEOCheckerApp {
            constructor() {
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                // チェックタイプ選択処理
                document.querySelectorAll('.check-type-option').forEach(option => {
                    option.addEventListener('click', function() {
                        // すべてのオプションからactiveクラスを削除
                        document.querySelectorAll('.check-type-option').forEach(opt => {
                            opt.classList.remove('active');
                        });
                        
                        // クリックされたオプションにactiveクラスを追加
                        this.classList.add('active');
                        
                        // waitForJSの値を更新
                        const waitForJSInput = document.getElementById('waitForJS');
                        waitForJSInput.value = this.dataset.type === 'advanced' ? 'true' : 'false';
                    });
                });

                document.getElementById('seoCheckForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.runSEOCheck();
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.clearForm();
                });

                // タブ切り替え
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.switchTab(e.target.dataset.tab);
                    });
                });
            }

            async runSEOCheck() {
                const url = document.getElementById('url').value;
                const html = document.getElementById('html').value;
                const competitorUrl = document.getElementById('competitorUrl')?.value?.trim() || '';
                const waitForJSEl = document.getElementById('waitForJS');
                // checkbox の `.checked` ではなく hidden input の value=='true' でも判定
                const waitForJS = waitForJSEl
                    ? (waitForJSEl.type === 'checkbox' ? waitForJSEl.checked : waitForJSEl.value === 'true')
                    : false;

                if (!url && !html) {
                    this.showError('URLまたはHTMLコンテンツを入力してください');
                    return;
                }

                // Phase 2-B: 比較対象URLが入力されていれば比較モード
                const isCompareMode = !!(url && competitorUrl);

                this.showLoading(true);
                this.hideResults();

                try {
                    if (isCompareMode) {
                        // 比較診断
                        const response = await fetch('/api/compare', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ primaryUrl: url, competitorUrl, waitForJS })
                        });
                        const data = await response.json();
                        if (data.success) {
                            this.displayComparisonResults(data.data);
                            this.showSuccess('比較診断が完了しました');
                        } else {
                            this.showError(data.error || '比較診断中にエラーが発生しました');
                        }
                    } else {
                        // 通常診断（従来）
                        const response = await fetch('/api/check/seo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ url, html, waitForJS })
                        });
                        const data = await response.json();
                        if (data.success) {
                            this.displayResults(data.data);
                            this.showSuccess('SEOチェックが完了しました');
                        } else {
                            this.showError(data.error || 'SEOチェック中にエラーが発生しました');
                        }
                    }
                } catch (error) {
                    this.showError('ネットワークエラーが発生しました: ' + error.message);
                } finally {
                    this.showLoading(false);
                }
            }

            // Phase 2-B: 比較結果の表示
            displayComparisonResults(data) {
                const { primary, competitor, comparison, warnings } = data;
                const resultsContainer = document.getElementById('resultsContainer');
                resultsContainer.style.display = 'block';

                // サマリータブ内容を比較ビューで上書き
                const summaryContent = document.getElementById('summaryContent');
                let html = '';

                // 警告（フォールバックなど）
                if (Array.isArray(warnings) && warnings.length > 0) {
                    html += '<div class="warnings-banner" role="region" aria-label="診断時の警告">';
                    for (const w of warnings) {
                        html += `<div class="warning-item" role="alert" aria-live="polite">
                            <strong>⚠️ ${this.escapeHtml(w.code || 'WARNING')}</strong>
                            <div>${this.escapeHtml(w.message || '')}</div>
                        </div>`;
                    }
                    html += '</div>';
                }

                if (!comparison || !comparison.available) {
                    html += `<div class="error-message">${this.escapeHtml(comparison?.reason || '比較できません')}</div>`;
                    summaryContent.innerHTML = html;
                    return;
                }

                const v = comparison.verdict;
                const primaryUrl = primary?.url || '自分のサイト';
                const competitorUrl = competitor?.url || '競合サイト';

                // 勝敗カード
                html += `
                    <div class="summary-section">
                        <h2>比較診断</h2>
                        <p class="hint">${this.escapeHtml(primaryUrl)} vs ${this.escapeHtml(competitorUrl)}</p>
                    </div>
                    <div class="compare-verdict-grid">
                        ${this.renderVerdictCard('SEO', v.seo)}
                        ${this.renderVerdictCard('AIO', v.aio)}
                        ${this.renderVerdictCard('総合', v.combined)}
                    </div>
                `;

                // カテゴリ勝ち数サマリ
                const wc = comparison.winCounts;
                html += `
                    <div class="summary-section">
                        <h2>カテゴリ別 勝ち負け</h2>
                        <div class="compare-winrate">
                            <div class="winrate-row">
                                <span class="winrate-label">あなたが優位</span>
                                <span class="winrate-bar"><span class="winrate-fill winrate-primary" style="width:${(wc.primary / comparison.totalCategories) * 100}%"></span></span>
                                <span class="winrate-count">${wc.primary} / ${comparison.totalCategories}</span>
                            </div>
                            <div class="winrate-row">
                                <span class="winrate-label">同等</span>
                                <span class="winrate-bar"><span class="winrate-fill winrate-tie" style="width:${(wc.tie / comparison.totalCategories) * 100}%"></span></span>
                                <span class="winrate-count">${wc.tie} / ${comparison.totalCategories}</span>
                            </div>
                            <div class="winrate-row">
                                <span class="winrate-label">競合が優位</span>
                                <span class="winrate-bar"><span class="winrate-fill winrate-competitor" style="width:${(wc.competitor / comparison.totalCategories) * 100}%"></span></span>
                                <span class="winrate-count">${wc.competitor} / ${comparison.totalCategories}</span>
                            </div>
                        </div>
                    </div>
                `;

                // 競合が対応していてあなたが未対応のハイライト
                if (comparison.gapsToClose && comparison.gapsToClose.length > 0) {
                    html += `<div class="summary-section">
                        <h2>競合が先行している項目 (${comparison.gapsToClose.length}件)</h2>
                        <p class="hint">競合が高スコア (80+) でかつ自分が低スコア (50未満) の項目</p>
                        <div class="compare-gap-list">`;
                    comparison.gapsToClose.forEach(g => {
                        html += `<div class="compare-gap-item">
                            <span class="compare-gap-name">${this.escapeHtml(this.getCategoryTitle(g.category))}</span>
                            <span class="compare-gap-scores">
                                <span class="score-mine">あなた: ${g.primary}</span>
                                <span class="score-arrow">→</span>
                                <span class="score-competitor">競合: ${g.competitor}</span>
                                <span class="score-diff diff-negative">-${g.competitor - g.primary}</span>
                            </span>
                        </div>`;
                    });
                    html += `</div></div>`;
                }

                // あなたが先行している項目
                if (comparison.myAdvantages && comparison.myAdvantages.length > 0) {
                    html += `<div class="summary-section">
                        <h2>あなたが先行している項目 (${comparison.myAdvantages.length}件)</h2>
                        <p class="hint">自分が高スコア (80+) でかつ競合が低スコア (50未満) の項目</p>
                        <div class="compare-gap-list">`;
                    comparison.myAdvantages.forEach(g => {
                        html += `<div class="compare-gap-item compare-advantage">
                            <span class="compare-gap-name">${this.escapeHtml(this.getCategoryTitle(g.category))}</span>
                            <span class="compare-gap-scores">
                                <span class="score-mine">あなた: ${g.primary}</span>
                                <span class="score-arrow">→</span>
                                <span class="score-competitor">競合: ${g.competitor}</span>
                                <span class="score-diff diff-positive">+${g.primary - g.competitor}</span>
                            </span>
                        </div>`;
                    });
                    html += `</div></div>`;
                }

                // 全カテゴリ差分テーブル
                html += `<div class="summary-section">
                    <h2>全カテゴリ詳細</h2>
                    <table class="compare-table">
                        <thead><tr>
                            <th>カテゴリ</th>
                            <th>種別</th>
                            <th class="num">あなた</th>
                            <th class="num">競合</th>
                            <th class="num">差</th>
                            <th>結果</th>
                        </tr></thead>
                        <tbody>`;
                comparison.categoryDiffs.forEach(d => {
                    const sign = d.diff > 0 ? '+' : '';
                    const winnerLabel = d.winner === 'primary' ? '◯ あなた' : d.winner === 'competitor' ? '✗ 競合' : '= 同等';
                    html += `<tr class="compare-row winner-${d.winner}">
                        <td>${this.escapeHtml(this.getCategoryTitle(d.category))}</td>
                        <td><span class="type-badge type-${d.type}">${d.type.toUpperCase()}</span></td>
                        <td class="num">${d.primary}</td>
                        <td class="num">${d.competitor}</td>
                        <td class="num diff-${d.diff > 0 ? 'positive' : d.diff < 0 ? 'negative' : 'tie'}">${sign}${d.diff}</td>
                        <td>${winnerLabel}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;

                summaryContent.innerHTML = html;

                // 他のタブはシンプルに「比較モードでは表示しません」と注意書き
                // Phase 1.8: specificContent / detailedContent / reportContent は削除済み
                ['detailsContent', 'aioContent', 'structuredDataContent'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.innerHTML = '<p class="hint" style="padding:1rem;">比較モードでは「サマリー」タブのみ表示されます。詳細を見たい場合は、比較対象URLを空にして単独で診断してください。</p>';
                    }
                });

                // サマリータブをアクティブに
                this.switchTab('summary');
            }

            // 比較モード用: 勝敗カードを描画
            renderVerdictCard(label, v) {
                const winnerClass = v.winner === 'primary' ? 'winner-primary' : v.winner === 'competitor' ? 'winner-competitor' : 'winner-tie';
                const winnerLabel = v.winner === 'primary' ? 'あなたが優位' : v.winner === 'competitor' ? '競合が優位' : '同等';
                const diffSign = v.diff > 0 ? '+' : '';
                return `
                    <div class="verdict-card ${winnerClass}">
                        <div class="verdict-label">${label}</div>
                        <div class="verdict-scores">
                            <span class="verdict-mine">${v.primary}</span>
                            <span class="verdict-vs">vs</span>
                            <span class="verdict-them">${v.competitor}</span>
                        </div>
                        <div class="verdict-diff">${diffSign}${v.diff}</div>
                        <div class="verdict-result">${winnerLabel}</div>
                    </div>
                `;
            }

            displayResults(results) {
                // ヘッダのoverallScore要素はPhase 1.2で削除（スコアはサマリーカードのみで表現）
                const overallEl = document.getElementById('overallScore');
                if (overallEl) overallEl.textContent = results.combinedScore || results.overallScore;

                // サマリー表示
                this.displaySummary(results);
                
                // 詳細表示
                this.displayDetails(results);
                
                // AIO詳細表示
                this.displayAIO(results);
                
                // 構造化データ詳細表示
                this.displayStructuredData(results);
                
                // Phase 1.8: '具体的な箇所' / '詳細レポート' / 'Markdownレポート' タブは削除済み
                this.showResults();
            }

            displaySummary(results) {
                const summaryContent = document.getElementById('summaryContent');
                const overallScore = results.overallScore || 0;
                const aioScore = results.aioOverallScore || 0;
                const combinedScore = results.combinedScore || 0;

                // スコア表示の更新（Phase 1.2: overallScore要素は削除済み、念のためガード）
                const overallEl2 = document.getElementById('overallScore');
                if (overallEl2) overallEl2.textContent = Math.round(overallScore);

                // 警告バナー（Advanced→Simple フォールバック等）
                let warningsHtml = '';
                if (Array.isArray(results.warnings) && results.warnings.length > 0) {
                    warningsHtml = '<div class="warnings-banner" role="region" aria-label="診断時の警告">' +
                        results.warnings.map(w =>
                            `<div class="warning-item" role="alert" aria-live="polite"><strong aria-label="警告コード">⚠️ ${this.escapeHtml(w.code || 'WARNING')}</strong><div>${this.escapeHtml(w.message || '')}</div>${w.detail ? `<details><summary>詳細</summary><code>${this.escapeHtml(w.detail)}</code></details>` : ''}</div>`
                        ).join('') +
                        '</div>';
                }

                let html = warningsHtml + `
                    <div class="summary-section">
                        <h2>総合スコア</h2>
                        <div class="score-grid">
                            <div class="score-item">
                                <div class="score-label">SEOスコア</div>
                                <div class="score-value ${this.getScoreClass(overallScore)}">${Math.round(overallScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">AIOスコア</div>
                                <div class="score-value ${this.getScoreClass(aioScore)}">${Math.round(aioScore)}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">総合スコア</div>
                                <div class="score-value ${this.getScoreClass(combinedScore)}">${Math.round(combinedScore)}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 簡潔な推奨アクションの表示
                if (results.conciseRecommendations && results.conciseRecommendations.length > 0) {
                    html += `
                        <div class="summary-section">
                            <h2>推奨アクション (${results.conciseRecommendations.length}件)</h2>
                            <div class="recommendations-list">
                    `;
                    
                    // Phase 2-E: 推奨アクションごとに「AI書き換え対象」を判定する
                    // category と issue 文言からマッピング
                    const llmTargetFor = (rec) => {
                        if (!rec) return null;
                        const cat = rec.category;
                        const issue = rec.issue || rec.fix || '';
                        // タイトル
                        if (cat === 'titleTag') return { target: 'title', label: 'タイトル' };
                        // メタディスクリプション
                        if (cat === 'metaDescription') return { target: 'metaDescription', label: 'メタディスクリプション' };
                        // H1 (見出し構造の中で H1 関連の issue のみ)
                        if (cat === 'headingStructure' && /H1/.test(issue)) return { target: 'h1', label: 'H1 見出し' };
                        // リンクテキスト
                        if (cat === 'internalLinkStructure' && /(リンクテキスト|汎用|空)/.test(issue)) return { target: 'linkText', label: 'リンクテキスト' };
                        // alt属性
                        if (cat === 'imageAltAttributes' && /(alt属性|alt)/i.test(issue)) return { target: 'altText', label: '画像 alt属性' };
                        return null;
                    };

                    // 診断結果からページ文脈を抽出 (LLM への入力用)
                    this._lastPageContext = {
                        url: results.url || '',
                        title: (results.checks && results.checks.titleTag && results.checks.titleTag.current) || '',
                        metaDescription: (results.checks && results.checks.metaDescription && results.checks.metaDescription.current) || '',
                        headings: [
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h1Texts || []),
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h2Texts || []),
                            ...(results.checks && results.checks.headingStructure && results.checks.headingStructure.h3Texts || []),
                        ].slice(0, 15),
                    };

                    results.conciseRecommendations.forEach((rec, idx) => {
                        const priorityClass = this.getPriorityClass(rec.priority);
                        const llmTarget = llmTargetFor(rec);
                        // Phase 2-E: AI 書き換えボタンも展開可能なら hasDetails=true
                        const hasDetails = !!(rec.codeExample || rec.docLink || llmTarget);
                        const detailsId = `rec-details-${idx}`;
                        const typeBadge = rec.type
                            ? `<span class="type-badge type-${rec.type}">${rec.type.toUpperCase()}</span>`
                            : '';
                        const codeBlock = rec.codeExample
                            ? `<div class="rec-code"><h4>修正例</h4><pre><code>${this.escapeHtml(rec.codeExample)}</code></pre></div>`
                            : '';
                        const docLink = rec.docLink
                            ? `<div class="rec-doc"><a href="${rec.docLink}" target="_blank" rel="noopener noreferrer">📖 参考ドキュメント →</a></div>`
                            : '';
                        const issueLine = rec.issue
                            ? `<div class="rec-issue"><strong>検出された問題:</strong> ${this.escapeHtml(rec.issue)}</div>`
                            : '';
                        // Phase 2-E: AI 書き換えボタン (該当 category のみ)
                        const llmButton = llmTarget
                            ? `<div class="rec-llm-suggest" data-llm-target="${llmTarget.target}" data-llm-label="${this.escapeHtml(llmTarget.label)}" data-llm-current="${this.escapeHtml(this._extractCurrentValue(rec, results))}">
                                <button type="button" class="llm-suggest-btn">✨ AI に書き換え提案を依頼</button>
                                <div class="llm-suggest-result" hidden></div>
                            </div>`
                            : '';
                        const toggle = hasDetails
                            ? `<span class="toggle-icon" data-target="${detailsId}">▼</span>`
                            : '';
                        const extra = hasDetails
                            ? `<div class="recommendation-extra" id="${detailsId}" style="display:none;">${issueLine}${codeBlock}${docLink}${llmButton}</div>`
                            : '';
                        // Phase 1.3: a11y — 開閉トグルがある行は <button>, ない行は <div>
                        const headerOpenTag = hasDetails
                            ? `<button type="button" class="recommendation-header" data-toggle="${detailsId}" aria-expanded="false" aria-controls="${detailsId}">`
                            : `<div class="recommendation-header">`;
                        const headerCloseTag = hasDetails ? `</button>` : `</div>`;
                        html += `
                            <div class="recommendation-item ${priorityClass}">
                                ${headerOpenTag}
                                    <span class="checkmark" aria-hidden="true">✓</span>
                                    <span class="recommendation-text">${this.escapeHtml(rec.fix)}</span>
                                    <span class="priority-badge ${priorityClass}" aria-label="優先度: ${this.getPriorityTitle(rec.priority)}">${this.getPriorityTitle(rec.priority)}</span>
                                    ${toggle}
                                ${headerCloseTag}
                                <div class="recommendation-details">
                                    <span class="element-info">${this.escapeHtml(rec.element)}</span>
                                    <span class="location-info">${this.escapeHtml(rec.location)}</span>
                                    ${rec.count > 1 ? `<span class="count-info">${rec.count}件</span>` : ''}
                                    ${typeBadge}
                                </div>
                                ${extra}
                            </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                }
                
                summaryContent.innerHTML = html;
                this.attachRecommendationToggles();
                // Phase 2-E: AI 書き換え提案ボタンのイベントバインド
                this.attachLlmSuggestHandlers();
            }

            // Phase 2-E: 推奨アクションの category から「現在の値」を抽出する
            _extractCurrentValue(rec, results) {
                if (!rec || !results || !results.checks) return '';
                const cat = rec.category;
                const checks = results.checks;
                if (cat === 'titleTag' && checks.titleTag) return checks.titleTag.current || '';
                if (cat === 'metaDescription' && checks.metaDescription) return checks.metaDescription.current || '';
                if (cat === 'headingStructure' && checks.headingStructure) {
                    return (checks.headingStructure.h1Texts || []).join(' / ');
                }
                // リンクテキスト / alt属性 は recommend 中の count 件あるので個別値は取れない
                // detailedAnalysis から取得できれば良いが、現状は空でOK (LLM が文脈から推測する)
                return '';
            }

            // Phase 2-E: AI 書き換え提案ボタンのイベントバインド
            attachLlmSuggestHandlers() {
                document.querySelectorAll('.llm-suggest-btn').forEach(btn => {
                    if (btn.dataset.bound === '1') return;
                    btn.dataset.bound = '1';
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const wrap = btn.closest('.rec-llm-suggest');
                        if (!wrap) return;
                        const target = wrap.dataset.llmTarget;
                        const label = wrap.dataset.llmLabel || '対象';
                        const currentValue = wrap.dataset.llmCurrent || '';
                        const resultBox = wrap.querySelector('.llm-suggest-result');

                        btn.disabled = true;
                        btn.textContent = '⏳ AI に問い合わせ中...';
                        resultBox.hidden = false;
                        resultBox.innerHTML = '<p class="llm-loading">AI が ' + this.escapeHtml(label) + ' の書き換え案を考えています…</p>';

                        try {
                            const res = await fetch('/api/llm/suggest', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    target,
                                    currentValue,
                                    pageContext: this._lastPageContext || {},
                                }),
                            });
                            const data = await res.json();
                            if (!data.success) {
                                resultBox.innerHTML = '<p class="llm-error">' + this.escapeHtml(data.error || 'AI 提案の取得に失敗しました') + '</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                                return;
                            }
                            const suggestions = (data.data && data.data.suggestions) || [];
                            if (suggestions.length === 0) {
                                resultBox.innerHTML = '<p class="llm-error">AI から提案を取得できませんでした</p>';
                                btn.disabled = false;
                                btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                                return;
                            }
                            let html = '<div class="llm-suggestions-list">';
                            html += '<h5>AI 提案 (' + suggestions.length + '件)</h5>';
                            suggestions.forEach((s, i) => {
                                html += `
                                    <div class="llm-suggestion">
                                        <div class="llm-suggestion-header">
                                            <span class="llm-suggestion-num">提案 ${i + 1}</span>
                                            <button type="button" class="llm-suggestion-copy" data-copy="${this.escapeHtml(s.text)}">コピー</button>
                                        </div>
                                        <div class="llm-suggestion-text">${this.escapeHtml(s.text)}</div>
                                        <div class="llm-suggestion-reason">${this.escapeHtml(s.reason)}</div>
                                    </div>
                                `;
                            });
                            html += '</div>';
                            resultBox.innerHTML = html;

                            // コピー機能をバインド
                            resultBox.querySelectorAll('.llm-suggestion-copy').forEach(copyBtn => {
                                copyBtn.addEventListener('click', async (ev) => {
                                    ev.stopPropagation();
                                    const text = copyBtn.dataset.copy || '';
                                    try {
                                        if (navigator.clipboard && navigator.clipboard.writeText) {
                                            await navigator.clipboard.writeText(text);
                                        } else {
                                            const ta = document.createElement('textarea');
                                            ta.value = text;
                                            document.body.appendChild(ta);
                                            ta.select();
                                            document.execCommand('copy');
                                            document.body.removeChild(ta);
                                        }
                                        const orig = copyBtn.textContent;
                                        copyBtn.textContent = 'コピー済み';
                                        copyBtn.classList.add('copied');
                                        setTimeout(() => {
                                            copyBtn.textContent = orig;
                                            copyBtn.classList.remove('copied');
                                        }, 1500);
                                    } catch (_) {}
                                });
                            });

                            btn.textContent = '✨ もう一度提案を取得';
                            btn.disabled = false;
                        } catch (err) {
                            resultBox.innerHTML = '<p class="llm-error">通信エラー: ' + this.escapeHtml(err.message || 'unknown') + '</p>';
                            btn.disabled = false;
                            btn.textContent = '✨ AI に書き換え提案を依頼 (再試行)';
                        }
                    });
                });
            }

            displayDetails(results) {
                const detailsContent = document.getElementById('detailsContent');
                const categories = [
                    { key: 'titleTag', name: 'タイトルタグ' },
                    { key: 'metaDescription', name: 'メタディスクリプション' },
                    { key: 'headingStructure', name: '見出し構造（H1〜H3）' },
                    { key: 'imageAltAttributes', name: '画像のalt属性' },
                    { key: 'internalLinkStructure', name: '内部リンク構造' },
                    { key: 'structuredData', name: '構造化データ' },
                    { key: 'otherSEOElements', name: 'その他SEO要素' }
                ];

                let html = '';
                
                categories.forEach(category => {
                    const check = results.checks[category.key];
                    const scoreClass = this.getScoreClass(check.score);
                    
                    html += `
                        <div class="category">
                            <h3>${category.name}</h3>
                            <div class="category-score ${scoreClass}">スコア: ${check.score}/100</div>
                            
                            ${check.current !== undefined ? `<p><strong>現在の値:</strong> ${check.current}</p>` : ''}
                            
                            ${check.issues && check.issues.length > 0 ? `
                                <div class="issues-list">
                                    <h4>改善点 (${check.issues.length}件)</h4>
                                    <ul>
                                        ${check.issues.map(issue => `<li>${issue}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                            
                            ${check.recommendations && check.recommendations.length > 0 ? `
                                <div class="recommendations-list">
                                    <h4>推奨アクション (${check.recommendations.length}件)</h4>
                                    <ul>
                                        ${check.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                detailsContent.innerHTML = html;
            }

            displayAIO(results) {
                if (!results.aio) {
                    document.getElementById('aioContent').innerHTML = '<p>AIOチェック結果がありません</p>';
                    return;
                }

                const aioContent = document.getElementById('aioContent');
                const aioCategories = [
