openapi: 3.0.3
info:
  title: SEO AIO Doctor API
  description: WebページのSEO・AIO（AI検索最適化）診断およびレポート生成を行うAPI
  version: 1.1.0
  contact:
    name: SEO AIO Doctor
    url: https://github.com/tknakamura/seo-checker-tool

servers:
  - url: http://localhost:3001
    description: ローカル開発
  - url: /
    description: 相対パス（デプロイ環境）

tags:
  - name: SEO Check
    description: SEOチェック
  - name: Report
    description: レポート生成
  - name: History
    description: 分析履歴（MONGODB_URI 設定時のみ）

paths:
  /api/check/seo:
    post:
      tags:
        - SEO Check
      summary: SEOチェック実行
      description: URLまたはHTMLを指定してSEO・AIOの包括チェックを実行する
      operationId: checkSeo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeoCheckRequest'
      responses:
        '200':
          description: チェック成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeoCheckSuccessResponse'
        '400':
          description: リクエスト不正（URL/HTML未指定）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Phase 1.8: /api/report/seo, /api/report/detailed は UI の 'Markdownレポート' / '詳細レポート'
  # タブ削除に伴い廃止しました。git 履歴 (v2.5.0 以前) から復元可能です。

  /api/history:
    get:
      tags:
        - History
      summary: 分析履歴一覧
      description: 過去の分析履歴を取得する。MONGODB_URI が設定されている場合のみ利用可能。
      operationId: getHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: 取得件数
        - name: sessionId
          in: query
          schema:
            type: string
          description: セッションIDでフィルタ
        - name: userId
          in: query
          schema:
            type: string
          description: ユーザーIDでフィルタ
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AnalysisHistoryItem'
        '503':
          description: データベース未接続
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SeoCheckRequest:
      type: object
      description: URL または html のいずれか必須
      properties:
        url:
          type: string
          format: uri
          description: チェック対象のWebページURL
          example: https://example.com
        html:
          type: string
          description: チェック対象のHTML（直接貼り付け）
        waitForJS:
          type: boolean
          default: false
          description: true の場合 JavaScript 実行を待ってから解析（SPA対応）
        slim:
          type: boolean
          default: false
          description: true の場合 detailedAnalysis と detailedReport を省略しレスポンスを軽量化（サイズ制限対策）
      minProperties: 1

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: エラーメッセージ
        code:
          type: string
          description: エラーコード（任意）
        timestamp:
          type: string
          format: date-time
          description: エラー発生時刻（任意）

    SeoCheckSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: SEOチェック結果（overallScore, checks, aio, conciseRecommendations, detailedAnalysis, detailedReport 等）

    # Phase 1.8: ReportSuccessResponse は廃止 (/api/report/seo の撤去に伴い)

    AnalysisHistoryItem:
      type: object
      properties:
        _id:
          type: string
        url:
          type: string
          nullable: true
        inputType:
          type: string
          enum: [url, html]
        waitForJS:
          type: boolean
        overallScore:
          type: number
        aioOverallScore:
          type: number
        combinedScore:
          type: number
        sessionId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # Phase 1.8: DetailedReportSuccessResponse は廃止 (/api/report/detailed の撤去に伴い)
